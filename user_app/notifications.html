<style>
    :root {
        --bg-base: #0a0a0c;
        --bg-card: #1c1c1e;
        --bg-elevated: #2c2c2e;
        --point-green: #4ADE80;
        --point-pink: #FFA092;
        --point-blue: #73A5FF;
        --point-gold: #FCD34D;
        --text-main: #fcfcfc;
        --text-sub: #a1a1aa;
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-card: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text-main);
        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;
        min-height: 100vh; -webkit-tap-highlight-color: transparent;
    }

    header {
        position: sticky; top: 0; z-index: 100;
        background: rgba(10, 10, 12, 0.92); backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border-soft);
    }

    .top-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px 12px; gap: 10px;
    }

    .btn-back {
        width: 40px; height: 40px; border: 1px solid var(--border-card); border-radius: 12px;
        background: var(--bg-card); color: var(--text-main);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: transform 0.15s, background 0.15s;
    }
    .btn-back i { font-size: 1.35rem; line-height: 1; }
    .btn-back:active { transform: scale(0.96); background: var(--bg-elevated); }

    .page-heading { flex: 1; min-width: 0; }
    .page-heading h1 {
        margin: 0; font-family: 'Pretendard', sans-serif; font-size: 1.25rem; font-weight: 800;
        letter-spacing: -0.02em; color: var(--text-main);
        display: flex; align-items: center; gap: 8px;
    }
    .page-heading h1 .title-icon { color: var(--point-blue); font-size: 1.3rem; }
    .page-heading p {
        margin: 4px 0 0; font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
    }

    .btn-read-all {
        border: 1px solid var(--border-card); border-radius: 999px; padding: 8px 12px;
        background: var(--bg-card); color: var(--text-sub); font-size: 0.72rem; font-weight: 800;
        cursor: pointer; white-space: nowrap;
        font-family: inherit; transition: transform 0.15s, background 0.15s, color 0.15s;
    }
    .btn-read-all:not(:disabled):active { transform: scale(0.97); }
    .btn-read-all:not(:disabled):hover { color: var(--text-main); background: var(--bg-elevated); }
    .btn-read-all:disabled { opacity: 0.45; cursor: not-allowed; }

    main { padding: 16px 16px 100px; }

    .noti-page-list {
        list-style: none; margin: 0; padding: 0;
        display: flex; flex-direction: column; gap: 12px;
    }

    .noti-page-item {
        position: relative; display: flex; align-items: flex-start; gap: 14px;
        padding: 16px; background: var(--bg-card);
        border: 1px solid var(--border-card); border-radius: 18px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.28);
        cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    }
    .noti-page-item:active { transform: scale(0.98); }
    .noti-page-item.unread {
        background: linear-gradient(135deg, rgba(74, 222, 128, 0.06), var(--bg-card));
        border-color: rgba(74, 222, 128, 0.35);
        box-shadow: 0 4px 20px rgba(74, 222, 128, 0.08);
    }

    .noti-page-icon {
        width: 44px; height: 44px; flex-shrink: 0;
        border: 1px solid var(--border-soft); border-radius: 14px;
        background: var(--bg-elevated); display: flex; align-items: center; justify-content: center;
        font-size: 1.25rem; color: var(--text-main);
    }
    .noti-page-item.type-comment .noti-page-icon { color: var(--point-blue); border-color: rgba(115, 165, 255, 0.35); }
    .noti-page-item.type-reply .noti-page-icon { color: var(--point-blue); border-color: rgba(115, 165, 255, 0.35); }
    .noti-page-item.type-result .noti-page-icon { color: var(--point-green); border-color: rgba(74, 222, 128, 0.35); }
    .noti-page-item.type-honor .noti-page-icon { color: var(--point-gold); border-color: rgba(252, 211, 77, 0.35); }
    .noti-page-item.type-mypick .noti-page-icon { color: var(--point-gold); border-color: rgba(252, 211, 77, 0.35); }
    .noti-page-item.type-vote .noti-page-icon { color: var(--point-pink); border-color: rgba(255, 160, 146, 0.35); }
    .noti-page-item.type-end .noti-page-icon { color: var(--point-gold); border-color: rgba(252, 211, 77, 0.35); }
    .noti-page-item.type-penalty .noti-page-icon { color: var(--point-pink); border-color: rgba(255, 160, 146, 0.4); }
    .noti-page-item.type-system .noti-page-icon { color: var(--point-blue); }

    .noti-page-body { flex: 1; min-width: 0; padding-right: 8px; }
    .noti-page-message {
        margin: 0 0 6px; font-size: 0.92rem; font-weight: 700; line-height: 1.45;
        color: var(--text-main); word-break: keep-all;
    }
    .noti-page-time { font-size: 0.72rem; font-weight: 700; color: var(--text-sub); }

    .noti-page-dot {
        position: absolute; top: 16px; right: 14px;
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--point-pink);
        box-shadow: 0 0 8px rgba(255, 160, 146, 0.6);
    }

    .noti-page-loading,
    .noti-page-empty {
        text-align: center; padding: 48px 20px;
        border: 1px dashed var(--border-card); border-radius: 20px;
        background: rgba(28, 28, 30, 0.6);
    }
    .noti-page-empty-icon {
        font-size: 2rem; margin-bottom: 12px; color: var(--text-sub);
        display: flex; justify-content: center;
    }
    .noti-page-empty-title { margin: 0 0 6px; font-size: 1rem; font-weight: 800; }
    .noti-page-empty-desc { margin: 0; font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .noti-page-spinner {
        width: 36px; height: 36px; margin: 0 auto 12px;
        border: 3px solid var(--bg-elevated); border-top-color: var(--point-green);
        border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
<link rel="stylesheet" href="../css/common-layout.css">
<link rel="stylesheet" href="../css/mobile-shell.css">
<script src="../js/mobile-touch-guard.js"></script>
</head>
<body>
<div id="landscape-warning" class="landscape-warning" aria-hidden="true">
    <span class="landscape-warning__icon" aria-hidden="true">📱↻</span>
    <p class="landscape-warning__title">목 돌아가요!<br>픽클은 세로로 즐겨주세요 🥒</p>
    <p class="landscape-warning__sub">P!CKLE · PORTRAIT MODE ONLY</p>
</div>

<header>
    <div class="top-row">
        <button type="button" class="btn-back" onclick="history.back()" aria-label="뒤로"><i class="ph ph-caret-left" aria-hidden="true"></i></button>
        <div class="page-heading">
            <h1><i class="ph ph-bell title-icon" aria-hidden="true"></i> 알림</h1>
            <p id="notiUnreadCount" hidden></p>
        </div>
        <button type="button" class="btn-read-all" id="btnMarkAllRead" disabled>모두 읽음</button>
    </div>
</header>

<main>
    <ul class="noti-page-list" id="notiPageList" aria-live="polite">
        <li class="noti-page-loading">
            <div class="noti-page-spinner" aria-hidden="true"></div>
            <p>알림을 불러오는 중...</p>
        </li>
    </ul>
</main>

<div id="common-footer"></div>

<script src="../js/auth.js"></script>
<script src="../js/pickle-notifications.js?v=20260617_noti2"></script>
<script src="../js/notifications-page.js?v=20260617_noti2"></script>
</body>
</html>
