<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VDZBSH2YBT"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>P!CKLE - 알림</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #09090b;
        --card-bg: #18181b;
        --neon-green: #39ff14;
        --neon-pink: #ff007f;
        --neon-blue: #00f0ff;
        --theme-gold: #ffcc00;
        --text-main: #ffffff;
        --text-sub: #a1a1aa;
        --border-color: #27272a;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;
        min-height: 100vh; -webkit-tap-highlight-color: transparent;
    }

    header {
        position: sticky; top: 0; z-index: 100;
        background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(12px);
        border-bottom: 3px solid #000;
        box-shadow: 0 4px 0 var(--neon-green);
    }

    .top-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px 12px; gap: 10px;
    }

    .btn-back {
        width: 40px; height: 40px; border: 3px solid #000; border-radius: 12px;
        background: var(--card-bg); color: #fff; font-size: 1.1rem; font-weight: 900;
        cursor: pointer; box-shadow: 3px 3px 0 #000;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.15s;
    }
    .btn-back:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

    .page-heading { flex: 1; min-width: 0; }
    .page-heading h1 {
        margin: 0; font-family: 'Black Han Sans', sans-serif; font-size: 1.55rem;
        letter-spacing: -0.5px; color: var(--neon-green);
        text-shadow: 2px 2px 0 #000;
    }
    .page-heading p {
        margin: 2px 0 0; font-size: 0.72rem; font-weight: 700; color: var(--text-sub);
    }

    .btn-read-all {
        border: 3px solid #000; border-radius: 999px; padding: 8px 12px;
        background: var(--card-bg); color: var(--text-sub); font-size: 0.72rem; font-weight: 800;
        cursor: pointer; box-shadow: 3px 3px 0 #000; white-space: nowrap;
        font-family: inherit; transition: transform 0.15s, background 0.15s, color 0.15s;
    }
    .btn-read-all:not(:disabled):active {
        transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000;
    }
    .btn-read-all:not(:disabled):hover { color: #fff; }
    .btn-read-all:disabled { opacity: 0.45; cursor: not-allowed; }

    main { padding: 16px 16px 100px; }

    .noti-page-list {
        list-style: none; margin: 0; padding: 0;
        display: flex; flex-direction: column; gap: 12px;
    }

    .noti-page-item {
        position: relative; display: flex; align-items: flex-start; gap: 14px;
        padding: 16px; background: var(--card-bg);
        border: 3px solid #000; border-radius: 16px;
        box-shadow: 4px 4px 0 #000;
        cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    }
    .noti-page-item:active {
        transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000;
    }
    .noti-page-item.unread {
        background: linear-gradient(135deg, rgba(57, 255, 20, 0.08), var(--card-bg));
        border-color: var(--neon-green);
        box-shadow: 4px 4px 0 var(--neon-green);
    }

    .noti-page-icon {
        width: 46px; height: 46px; flex-shrink: 0;
        border: 3px solid #000; border-radius: 14px;
        background: #27272a; display: flex; align-items: center; justify-content: center;
        font-size: 1.35rem; box-shadow: 2px 2px 0 #000;
    }
    .noti-page-item.type-comment .noti-page-icon { border-color: var(--neon-blue); }
    .noti-page-item.type-result .noti-page-icon { border-color: var(--neon-green); }
    .noti-page-item.type-honor .noti-page-icon { border-color: var(--theme-gold); }
    .noti-page-item.type-mypick .noti-page-icon { border-color: var(--theme-gold); }
    .noti-page-item.type-vote .noti-page-icon { border-color: var(--neon-pink); }
    .noti-page-item.type-end .noti-page-icon { border-color: #ff6b35; }

    .noti-page-body { flex: 1; min-width: 0; padding-right: 8px; }
    .noti-page-message {
        margin: 0 0 6px; font-size: 0.92rem; font-weight: 700; line-height: 1.45;
        color: #fff; word-break: keep-all;
    }
    .noti-page-time { font-size: 0.72rem; font-weight: 700; color: var(--text-sub); }

    .noti-page-dot {
        position: absolute; top: 16px; right: 14px;
        width: 10px; height: 10px; border-radius: 50%;
        background: #ff0033; border: 2px solid #000;
        box-shadow: 0 0 8px rgba(255, 0, 51, 0.8);
    }

    .noti-page-loading,
    .noti-page-empty {
        text-align: center; padding: 48px 20px;
        border: 3px dashed #3f3f46; border-radius: 20px;
        background: rgba(24, 24, 27, 0.6);
    }
    .noti-page-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .noti-page-empty-title { margin: 0 0 6px; font-size: 1rem; font-weight: 900; }
    .noti-page-empty-desc { margin: 0; font-size: 0.82rem; color: var(--text-sub); line-height: 1.5; }

    .noti-page-spinner {
        width: 36px; height: 36px; margin: 0 auto 12px;
        border: 4px solid #333; border-top-color: var(--neon-green);
        border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .noti-bell { font-size: 1.5rem; position: relative; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
    .noti-bell:active { transform: scale(0.9); }

    nav.bottom-nav {
        position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
        width: 100%; max-width: 480px; background: #121214;
        border-top: 1px solid var(--border-color);
        display: flex; justify-content: space-around; padding: 10px 0 20px; z-index: 100;
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.65rem; font-weight: 700; color: var(--text-sub); cursor: pointer; }
    .nav-btn .nav-icon { font-size: 1.3rem; }
    .nav-btn.fire-btn .nav-icon { font-size: 1.6rem; }
</style>
</head>
<body>

<header>
    <div class="top-row">
        <button type="button" class="btn-back" onclick="history.back()" aria-label="뒤로">←</button>
        <div class="page-heading">
            <h1>🔔 알림</h1>
            <p id="notiUnreadCount" hidden></p>
        </div>
        <button type="button" class="btn-read-all" id="btnMarkAllRead" disabled>모두 읽음</button>
    </div>
</header>

<main>
    <ul class="noti-page-list" id="notiPageList" aria-live="polite">
        <li class="noti-page-loading">
            <div class="noti-page-spinner" aria-hidden="true"></div>
            <p>알림을 불러오는 중...</p>
        </li>
    </ul>
</main>

<nav class="bottom-nav">
    <div class="nav-btn" onclick="location.href='ranking.html'"><span class="nav-icon">🏆</span><span>랭킹</span></div>
    <div class="nav-btn" onclick="location.href='event.html'"><span class="nav-icon">🎁</span><span>이벤트</span></div>
    <div class="nav-btn fire-btn" onclick="location.href='create.html'"><span class="nav-icon">🔥</span><span>불판</span></div>
    <div class="nav-btn" onclick="location.href='search.html'"><span class="nav-icon">🔍</span><span>검색</span></div>
    <div class="nav-btn" onclick="location.href='mypage.html'"><span class="nav-icon">👤</span><span>마이</span></div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/pickle-notifications.js"></script>
<script src="../js/notifications-page.js"></script>
</body>
</html>
