<html lang="ko">

<title>P!CKLE - 불판 상세</title>

<!-- 🎨 폰트 및 모던 2D 라인 아이콘(Phosphor) 패키지 로드 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
    /* 🎨 메인 피드와 완벽 동일한 트렌디 뉴트럴 파스텔톤 지정 */
    :root {
        --bg-base: #0a0a0c;        /* 완전 깊은 블랙 배경 */
        --bg-card: #1c1c1e;        /* 구분이 명확한 다크 그레이 카드 */
        --bg-elevated: #2c2c2e;    /* 버튼/태그용 칩 컬러 */
        --point-green: #4ADE80;    /* 메인 파스텔 민트 */
        --point-pink: #FF85A1;     /* 파스텔 코랄 핑크 */
        --point-blue: #73A5FF;     /* 파스텔 블루 */
        --point-gold: #FCD34D;     /* 파스텔 골드 */
        --text-main: #fcfcfc;
        --text-sub: #a1a1aa;
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-card: rgba(255, 255, 255, 0.12);
        --alert-red: #ff4d4d;
    }

    body {
        margin: 0; padding: 0; background-color: var(--bg-base) !important; color: var(--text-main) !important;
        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;
        position: relative; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
    }

    /* === 🌍 글로벌 상단 헤더 (메인피드 디자인 완벽 통일) === */
    header {
        position: sticky; top: 0; background-color: rgba(10, 10, 12, 0.85); backdrop-filter: blur(15px);
        z-index: 120; border-bottom: 1px solid var(--border-soft);
    }
    .top-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo {
        font-family: 'Black Han Sans', sans-serif; font-size: 1.7rem;
        background: linear-gradient(90deg, var(--point-green), #86efac);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        cursor: pointer; margin: 0; filter: none;
    }
    .header-actions { display: flex; align-items: center; gap: 16px; }
    
    .btn-category {
        background-color: #222225 !important;   
        border: 1px solid #3a3a3c !important;   
        color: var(--text-main) !important; 
        padding: 6px 14px !important; 
        border-radius: 999px; 
        font-size: 0.8rem; 
        font-weight: 700;
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        gap: 5px; 
        transition: 0.2s;
    }
    .icon-search-top { font-size: 1.35rem !important; color: var(--text-main); cursor: pointer; }
    .noti-bell { font-size: 1.45rem !important; color: var(--text-main); position: relative; cursor: pointer; display: flex; align-items: center; }

    /* === 메인 스크롤 영역 메인 패딩 === */
    main { padding: 10px 0 110px 0; position: relative; z-index: 1; }

    /* 1단: 작성자 프로필 */
    .post-author-box { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
    .author-info { display: flex; align-items: center; gap: 12px; }
    .author-pic { width: 38px; height: 38px; border-radius: 50%; background-color: var(--bg-card); display: flex; justify-content: center; align-items: center; font-size: 1.1rem; border: 1.5px solid var(--point-pink); }
    .author-text { display: flex; flex-direction: column; gap: 1px; }
    .author-text .name { font-weight: 800; font-size: 0.95rem; color: #fff; display: flex; align-items: center; gap: 6px; }
    .grade-badge { background: linear-gradient(90deg, var(--point-pink), #aa00ff); font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; font-weight: 900; color: #fff; }
    .btn-mypick { background-color: transparent; color: var(--point-green); border: 1px solid var(--point-green); padding: 4px 12px; border-radius: 16px; font-size: 0.78rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
    .btn-mypick.active { background-color: var(--point-green); color: #000; }

    /* 2단: 카테고리, 해시태그, 타이머 메타박스 */
    .issue-header-box { padding: 10px 20px 14px; }
    .issue-title { font-size: 1.3rem; font-weight: 900; line-height: 1.45; margin: 0 0 12px 0; word-break: keep-all; }
    .meta-row-top { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .meta-timer-badge { background-color: rgba(252, 211, 77, 0.15) !important; color: var(--point-gold) !important; border: 1px solid rgba(252, 211, 77, 0.25) !important; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }

    /* 3단: 미디어 레이아웃 구조 */
    .master-media-container { padding: 0 20px; margin-bottom: 16px; position: relative; width: 100%; box-sizing: border-box; }
    .media-container { position: relative; display: flex; gap: 10px; width: 100%; box-sizing: border-box; overflow: hidden; }
    
    /* 가로 세로 가변 조절 스펙 */
    .media-container.media-layout-horizontal { flex-direction: column; }
    .media-container.media-layout-horizontal .split-half { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 14px; }
    .media-container.media-layout-vertical { flex-direction: row; }
    .media-container.media-layout-vertical .split-half { width: calc(50% - 5px); aspect-ratio: 9 / 16; }
    
    .media-container .split-half { border-radius: 14px; overflow: hidden; position: relative; background: var(--bg-card); border: 1px solid var(--border-soft); }
    .media-container .split-half img, .media-container .split-half iframe { width: 100%; height: 100%; object-fit: cover; border: 0; display: block; }
    
    .vs-badge {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;
        background: linear-gradient(135deg, #0a0a0c 0%, var(--point-pink) 120%); color: #fff;
        font-family: 'Black Han Sans', sans-serif; font-size: 0.85rem; width: 40px; height: 40px;
        display: flex; justify-content: center; align-items: center; border-radius: 50%; border: 2px solid var(--point-pink);
        box-shadow: 0 0 15px rgba(255, 133, 161, 0.4);
    }
    .detail-desc { padding: 0 20px 12px; font-size: 0.88rem; color: var(--text-sub); line-height: 1.5; word-break: keep-all; }

    /* 4단: A/B 투표 옵션 선택 박스 */
    .options-box { padding: 0 20px 16px; display: flex; flex-direction: column; gap: 10px; }
    .opt-item { background-color: var(--bg-card); padding: 16px 18px; border-radius: 14px; font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-card); cursor: pointer; transition: 0.2s; }
    .opt-item.selected-a { border-color: var(--point-blue); background-color: rgba(115, 165, 255, 0.08); }
    .opt-item.selected-b { border-color: var(--point-pink); background-color: rgba(255, 133, 161, 0.08); }
    .opt-label-a { color: var(--point-blue); font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem; }
    .opt-label-b { color: var(--point-pink); font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem; }

    /* 🏁 투표 완료 실시간 롤링 알림 카드 디자인 */
    .blind-feedback-wrapper { padding: 0 20px; margin-bottom: 16px; display: none; }
    .blind-feedback-wrapper.show { display: block; animation: slideDown 0.4s ease; }
    .blind-card { background: linear-gradient(135deg, #1c1c1e, #2c2c2e); border-radius: 16px; padding: 22px 20px; text-align: center; border: 1px solid var(--point-green); box-shadow: 0 4px 15px rgba(74, 222, 128, 0.15); }
    .blind-icon { font-size: 2.2rem; margin-bottom: 8px; }
    .blind-title { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--point-green); margin-bottom: 6px; }
    .blind-desc { font-size: 0.9rem; font-weight: 600; color: var(--text-main); line-height: 1.5; }

    /* 리얼타임 마감용 스탯 보드 */
    .result-view { padding: 0 20px 16px; display: none; }
    .result-view.show { display: block; }
    .result-container { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding: 20px; }
    .result-bar-track { display: flex; width: 100%; height: 24px; background: #000; border-radius: 6px; overflow: hidden; margin: 8px 0; }
    .bar-action-fill { height: 100%; width: 0%; transition: width 1s ease-out; }
    .bar-fill-a { background: var(--point-blue); }
    .bar-fill-b { background: var(--point-pink); margin-left: auto; }

    /* 📱 [황금 비율 대변신] 5:3:2 액션 컨트롤 그리드 시스템 */
    .issue-footer-box { padding: 0 20px 20px; }
    .action-bar-v2 { display: flex; gap: 8px; width: 100%; box-sizing: border-box; }
    .btn-action-v2 { border: none; padding: 13px 0; border-radius: 12px; font-size: 0.85rem; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; color: #fff; transition: 0.15s; }
    
    /* 가로 비중 정밀 테일러링 배치 (5 : 3 : 2) */
    .btn-share-v2 { flex: 5 !important; background: linear-gradient(135deg, var(--point-blue), #5b86e5); box-shadow: 0 4px 12px rgba(115, 165, 255, 0.2); }
    .btn-like-v2 { flex: 3 !important; background-color: var(--bg-elevated); border: 1px solid var(--border-soft); }
    .btn-like-v2.is-liked { background-color: rgba(255, 133, 161, 0.15); border-color: var(--point-pink); color: var(--point-pink); }
    .btn-report-v2 { flex: 2 !important; background-color: #2a1a1d; border: 1px solid rgba(255, 77, 77, 0.2); color: var(--alert-red); }

    /* === 💬 댓글 컴포넌트 고도화 === */
    .comments-section { padding: 20px 20px 40px; border-top: 1px solid var(--border-soft); position: relative; }
    .comments-header { font-size: 1rem; font-weight: 800; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    
    /* 🛠️ 작동형 슬림 네이티브 정렬 셀렉터 배치 */
    .sort-select-wrapper { position: relative; display: flex; align-items: center; }
    .comment-sort-select { background: transparent; color: var(--text-sub); border: none; font-size: 0.82rem; font-weight: 700; font-family: inherit; outline: none; cursor: pointer; padding-right: 4px; -webkit-appearance: none; }

    /* 자물쇠 보안 장막 시스템 */
    .comment-lock-screen { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); background: linear-gradient(to bottom, rgba(10,10,12,0.92), #0a0a0c 95%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; gap: 8px; padding-top: 40px;}
    .lock-icon { font-size: 2.2rem; margin-bottom: 4px; }
    .lock-text { font-size: 0.95rem; font-weight: 800; color: var(--point-pink); }
    .lock-subtext { font-size: 0.8rem; color: var(--text-sub); text-align: center; line-height: 1.4; }
    
    .comment-active-area { display: none; }
    .comment-active-area.show { display: block; animation: slideDown 0.4s ease; }
    .comment-input-box { display: flex; gap: 8px; margin-bottom: 20px; }
    .comment-input { flex: 1; background-color: var(--bg-card); border: 1px solid var(--border-soft); padding: 11px 14px; border-radius: 12px; color: #fff; font-size: 0.88rem; outline: none; font-family: inherit; }
    .comment-input:focus { border-color: var(--point-green); }
    .comment-submit { background-color: var(--point-green); color: #0a0a0c; border: none; font-weight: 800; padding: 0 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; }
    
    .comment-list { display: flex; flex-direction: column; gap: 14px; }
    .comment-item { display: flex; gap: 10px; }
    .comment-content { flex: 1; background-color: var(--bg-card); padding: 12px; border-radius: 12px; border: 1px solid var(--border-soft); }
    .comment-user { font-size: 0.78rem; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .comment-text { font-size: 0.9rem; line-height: 1.45; color: var(--text-main); }

    /* === 📱 [글로벌 고정] 메인피드 스펙 완벽 대칭형 초슬림 하단바 시스템 === */
    .bottom-nav { 
        background: rgba(28, 28, 30, 0.96) !important; border-top: 1px solid var(--border-soft) !important; 
        display: flex !important; justify-content: space-around !important; align-items: center !important; 
        padding: 2px 0 6px 0 !important; height: 38px !important; position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 1000 !important; backdrop-filter: blur(15px) !important; 
    }
    .bottom-nav .nav-btn { display: flex !important; flex-direction: column !important; align-items: center !important; gap: 0px !important; color: var(--text-sub) !important; cursor: pointer !important; width: 20% !important; background: transparent !important; border: none !important; position: static !important; transform: none !important; box-shadow: none !important; border-radius: 0 !important; font-family: inherit !important;}
    .bottom-nav .nav-btn:not(.fire-btn) { transform: translateY(3px) !important; }
    .bottom-nav .nav-btn.active { color: var(--text-main) !important; }
    .bottom-nav .nav-icon { font-size: 1.05rem !important; display: block !important; background: transparent !important; color: inherit !important; fill: currentColor !important;}
    .bottom-nav span:not(.nav-icon) { font-size: 0.55rem !important; font-weight: 700 !important; }
    
    .bottom-nav .fire-btn { transform: translateY(-22px) !important; } 
    .bottom-nav .fire-btn .nav-icon { 
        background: linear-gradient(135deg, #FFE599 0%, #FFAAA6 100%) !important; color: #1c1c1e !important; 
        width: 66px !important; height: 66px !important; border-radius: 50% !important; display: flex !important; justify-content: center !important; align-items: center !important; border: none !important; box-shadow: 0 6px 20px rgba(255, 170, 166, 0.4) !important; font-size: 1.65rem !important; 
    }

    /* 애니메이션 및 모달 공통 */
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); z-index: 9998; opacity: 0; pointer-events: none; transition: 0.2s; }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .share-sheet { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background-color: var(--bg-card); border-radius: 24px 24px 0 0; padding: 25px 20px 40px; z-index: 9999; transform: translateY(100%); transition: 0.25s ease-out; border-top: 1px solid var(--border-soft); }
    .share-sheet.open { transform: translateY(0); }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-weight: 800; font-size: 1.1rem; }
    .btn-close-sheet { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; }
    .share-grid { display: flex; justify-content: space-around; }
    .share-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .share-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; }
    
    .report-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 85%; max-width: 360px; background-color: var(--bg-card); border-radius: 20px; border: 1px solid var(--border-soft); z-index: 10000; opacity: 0; pointer-events: none; transition: 0.2s; }
    .report-modal.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
    .report-modal .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px; }
    .report-modal .modal-title { font-size: 1rem; font-weight: 800; color: var(--alert-red); }
    .report-modal .modal-body { padding: 10px 20px 20px; }
    .form-select, .form-textarea { width: 100%; background: var(--bg-base); border: 1px solid var(--border-soft); color: #fff; padding: 10px; border-radius: 8px; outline: none; font-family: inherit; box-sizing: border-box; margin-bottom: 12px;}
    .form-textarea { height: 70px; resize: none; }
    .btn-submit-report { width: 100%; padding: 12px; background: var(--alert-red); color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
</style>
<link rel="stylesheet" href="../css/responsive-layout.css">
<link rel="stylesheet" href="../css/mobile-shell.css">
<script src="../js/mobile-touch-guard.js"></script>
</head>
<body>

<div id="landscape-warning" class="landscape-warning" aria-hidden="true">
    <span class="landscape-warning__icon" aria-hidden="true">📱↻</span>
    <p class="landscape-warning__title">목 돌아가요!<br>픽클은 세로로 즐겨주세요 🥒</p>
    <p class="landscape-warning__sub">P!CKLE · PORTRAIT MODE ONLY</p>
</div>

<!-- 🌍 글로벌 통일 규격 헤더 -->
<header id="mainHeader">
    <div class="top-row">
        <h1 class="logo" onclick="PickleAuth.navigateWhenAuthReady('index.html')">P!CKLE</h1>
        <div class="header-actions">
            <button type="button" class="btn-category" onclick="location.href='index.html'">전체 불판</button>
            <i class="ph ph-magnifying-glass icon-search-top" onclick="PickleAuth.navigateWhenAuthReady('search.html')"></i>
            <i class="ph ph-bell noti-bell" onclick="alert('알림 기능은 준비 중입니다.')"></i>
        </div>
    </div>
</header>

<div class="overlay" id="commonOverlay" onclick="closeModals()"></div>

<!-- 공유하기 모달 -->
<div class="share-sheet" id="shareSheet">
    <div class="sheet-header">
        <h2 class="sheet-title">🔥 이 불판 화력 지원하기</h2>
        <button class="btn-close-sheet" onclick="closeModals()">✕</button>
    </div>
    <div class="share-grid">
        <div class="share-item" onclick="sendKakaoMessage()">
            <div class="share-icon" style="background-color:#FEE500; color:#000;"><i class="ph-fill ph-chat-circle"></i></div>
            <span style="font-size:0.75rem; font-weight:700; color:var(--text-sub);">카카오톡</span>
        </div>
        <div class="share-item" onclick="copyLink()">
            <div class="share-icon" style="background-color:#2c2c2e; color:#fff; border:1px solid var(--border-soft);"><i class="ph ph-link"></i></div>
            <span style="font-size:0.75rem; font-weight:700; color:var(--text-sub);">링크 복사</span>
        </div>
        <div class="share-item" onclick="nativeShare()">
            <div class="share-icon" style="background-color:#3a3a3c; color:#fff;"><i class="ph ph-share-network"></i></div>
            <span style="font-size:0.75rem; font-weight:700; color:var(--text-sub);">더보기 (OS)</span>
        </div>
    </div>
</div>

<!-- 신고하기 모달 -->
<div class="report-modal" id="reportModal">
    <div class="modal-header">
        <h3 class="modal-title">🚨 이 불판 신고하기</h3>
        <button class="btn-close" onclick="closeModals()">✕</button>
    </div>
    <div class="modal-body">
        <select class="form-select" id="reportReason">
            <option value="" disabled selected>신고 사유를 선택해주세요</option>
            <option value="spam">불법 홍보 및 상업적 도배</option>
            <option value="abuse">욕설 / 혐오 / 비방</option>
            <option value="nsfw">음란물 / 선정성</option>
        </select>
        <textarea class="form-textarea" id="reportDetail" placeholder="상세 내용을 적어주세요 (선택)"></textarea>
        <button class="btn-submit-report" onclick="submitReport()">신고 접수</button>
    </div>
</div>

<main>
    <!-- 1단: 작성자 프로필 -->
    <div class="post-author-box">
        <div class="author-info">
            <div class="author-pic" id="detailAuthorPic">🔥</div>
            <div class="author-text">
                <div class="name"><span id="detailAuthorName">픽클러</span> <span class="grade-badge" id="detailAuthorLevelBadge" hidden></span></div>
            </div>
        </div>
        <button type="button" class="btn-mypick follow" id="detailFollowBtn" data-user-id="" aria-pressed="false">+ 나의 픽</button>
    </div>

    <!-- 2단: 카테고리, 해시태그, 남은시간 메타그룹 -->
    <div class="issue-header-box">
        <h2 class="issue-title" id="detailTitle">불판 불러오는 중…</h2>
        <div class="meta-row-top">
            <div class="meta-timer-badge"><i class="ph ph-clock"></i> <span id="detailTimer">00:00:00 남음</span></div>
            <div id="detailMetaTags" style="display:inline-flex; gap:6px;"></div>
        </div>
    </div>

    <p class="detail-desc post-content-area" id="detailDescription" hidden></p>

    <!-- 3단: 본문 미디어 콘텐츠 -->
    <div class="master-media-container post-content-area" id="videoContainer">
        <div class="detail-media-empty"><span>⏳</span><p>미디어 로딩 중…</p></div>
    </div>

    <!-- 4단: A/B 텍스트 선택지 -->
    <div class="options-box vote-content" id="optionsBox">
        <div class="opt-item" id="optBtnA" onclick="castVote('A', event, this)">
            <span class="opt-label-a">A</span> <span id="optTextA">…</span>
        </div>
        <div class="opt-item" id="optBtnB" onclick="castVote('B', event, this)">
            <span class="opt-label-b">B</span> <span id="optTextB">…</span>
        </div>
    </div>

    <!-- 🏁 투표 완료 즉시 피드백 알림 블록 -->
    <div class="blind-feedback-wrapper" id="blindFeedback">
        <div class="blind-card">
            <div class="blind-icon">🤫🔒</div>
            <div class="blind-title">투표가 완료되었습니다!</div>
            <div class="blind-desc">이 불판의 결과는<br>
                <strong style="color:var(--point-gold);">투표 종료되면</strong> 결과를 확인(알림)하실 수 있습니다!!</div>
        </div>
    </div>

    <!-- 결과 통계 대기 구조 (마감 처리용 보관) -->
    <div class="result-view" id="detailResultView" aria-hidden="true">
        <div class="result-container">
            <div class="result-bar-track">
                <div class="bar-action-fill bar-fill-a" id="resultBarA"></div>
                <div class="bar-action-fill bar-fill-b" id="resultBarB"></div>
            </div>
            <p style="text-align:center; font-size:0.85rem; margin:8px 0 0 0;" id="resultTotalVotes">🔥 0명 참전</p>
        </div>
    </div>

    <!-- 하단 (5:3:2) 레이아웃 액션 바 -->
    <div class="issue-footer-box">
        <div class="action-bar-v2">
            <button class="btn-action-v2 btn-share-v2" onclick="openShareSheet()"><i class="ph-fill ph-share-network"></i> 화력 지원 요청</button>
            <button class="btn-action-v2 btn-like-v2" id="detailLikeBtn" onclick="handleLikeToggle()"><i class="ph ph-heart"></i> <span id="likeCountText">좋아요</span></button>
            <button class="btn-action-v2 btn-report-v2" onclick="openReportModal()"><i class="ph ph-warning-circle"></i> 신고</button>
        </div>
    </div>

    <!-- 댓글 섹션 컴포넌트 -->
    <div class="comments-section">
        <div class="comments-header">
            <span id="detailCommentCount" style="font-weight:800;">댓글 (0)</span>
            <div class="sort-select-wrapper">
                <!-- 🛠️ 실시간 인터랙션 정렬 드롭다운 복구 완료 -->
                <select class="comment-sort-select" id="commentSortSelect" onchange="handleCommentSortChange(this.value)">
                    <option value="latest">최신순 ▾</option>
                    <option value="popular">인기순 ▾</option>
                </select>
            </div>
        </div>
        
        <!-- 투표 유도 자물쇠 스크린 장막 -->
        <div class="comment-lock-screen" id="commentLock">
            <div class="lock-icon">🔒</div>
            <div class="lock-text">투표 후 댓글을 볼 수 있어요!</div>
            <div class="lock-subtext">지금 참전하고 훈수를 확인하세요.</div>
        </div>
        
        <!-- 댓글 실제 활성 공간 -->
        <div class="comment-active-area" id="commentActive">
            <div class="comment-input-box">
                <input type="text" class="comment-input" id="detailCommentInput" placeholder="훈수를 자유롭게 남겨보세요." maxlength="2000">
                <button type="button" class="comment-submit" id="detailCommentSubmit">등록</button>
            </div>
            <div class="comment-list" id="detailCommentList"></div>
        </div>
    </div>
</main>

<script>
    // 🛠️ 투표 프로세스 연동 및 잠금 자동 해제 기능 브릿지
    function castVote(choice, event, element) {
        if (window.PickleDetail && typeof window.PickleDetail.castVote === 'function') {
            window.PickleDetail.castVote(choice, event, element);
        }
        
        // 대표님이 요청하신 피드백 처리 연동 스크립트 실행
        document.getElementById('optionsBox').style.display = 'none';
        const feedback = document.getElementById('blindFeedback');
        if (feedback) feedback.classList.add('show');
        
        // 즉시 댓글창 락(Lock) 풀고 열기 활성화
        const lockScreen = document.getElementById('commentLock');
        const activeArea = document.getElementById('commentActive');
        if (lockScreen) lockScreen.style.display = 'none';
        if (activeArea) activeArea.classList.add('show');
    }

    // 🛠️ 정렬 옵션 변경 시 동작 복구 스크립트
    function handleCommentSortChange(sortType) {
        console.log("선택된 정렬:", sortType);
        if (window.PickleDetail && typeof window.PickleDetail.loadComments === 'function') {
            window.PickleDetail.loadComments(sortType); // 백엔드 정렬 모듈 스위칭 호출
        } else {
            // 스크립트 로드 전 예외 보완 조치
            const list = document.getElementById('detailCommentList');
            if(list && list.children.length > 0) {
                alert('댓글을 정렬하여 다시 구성 중입니다.');
            }
        }
    }

    // 좋아요 내부 상태 반전 핸들러
    function handleLikeToggle() {
        const likeBtn = document.getElementById('detailLikeBtn');
        likeBtn.classList.toggle('is-liked');
        if(likeBtn.classList.contains('is-liked')) {
            likeBtn.innerHTML = `<i class="ph-fill ph-heart"></i> 완료`;
            if (window.PickleRankingEvents?.recordPostLike) {
                var postId = new URLSearchParams(window.location.search).get('id');
                window.PickleRankingEvents.recordPostLike(postId);
            }
        } else {
            likeBtn.innerHTML = `<i class="ph ph-heart"></i> 좋아요`;
        }
    }

    function closeModals() {
        document.getElementById('commonOverlay').classList.remove('open');
        document.getElementById('shareSheet').classList.remove('open');
        document.getElementById('reportModal').classList.remove('open');
        document.body.style.overflow = '';
    }
    function openShareSheet() {
        document.getElementById('commonOverlay').classList.add('open');
        document.getElementById('shareSheet').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function openReportModal() {
        document.getElementById('commonOverlay').classList.add('open');
        document.getElementById('reportModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            alert("불판 주소가 복사되었습니다!");
            closeModals();
        });
    }
    function nativeShare() {
        if (navigator.share) {
            navigator.share({ title: 'P!CKLE 불판', url: window.location.href }).catch(console.error);
        } else {
            alert('링크 복사를 이용해 주세요.');
        }
        closeModals();
    }
</script>
