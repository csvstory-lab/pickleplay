    .author-info { display: flex; align-items: center; gap: 12px; }

    /* 3?: ?? ??? ???? ?? */
    .master-media-container { padding: 0 20px; margin-bottom: 16px; position: relative; width: 100%; box-sizing: border-box; }
    .media-container { position: relative; display: flex; gap: 10px; width: 100%; box-sizing: border-box; overflow: hidden; }
    
    .media-container.media-layout-horizontal { flex-direction: column; }
    .media-container.media-layout-horizontal .split-half { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 14px; }
    .media-container.media-layout-vertical { flex-direction: row; }
    .media-container.media-layout-vertical .split-half { width: calc(50% - 5px); aspect-ratio: 9 / 16; }
    
    .media-container .split-half { border-radius: 14px; overflow: hidden; position: relative; background: var(--bg-card); border: 1px solid var(--border-soft); }
    .media-container .split-half img:not(.media-pickle-char),
    .media-container .split-half iframe { width: 100%; height: 100%; object-fit: cover; border: 0; display: block; }
    .media-container .split-half .split-embed { width: 100%; height: 100%; }
    .media-pickle-char {
        position: absolute;
        bottom: -5px;
        right: 5%;
        width: 50%;
        max-width: 150px;
        height: auto;
        z-index: 10;
        pointer-events: none;
        object-fit: contain;
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.35));
    }
    .media-pickle-char--flip { transform: scaleX(-1); }
    .single-media-wrap.single-media-image {
        position: relative;
        overflow: hidden;
        border-radius: 14px;
    }
    .single-media-wrap.single-media-image > img:not(.media-pickle-char) {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    
    /* ??? [??? ??] VS ?? ??? ??-?? ????? ?? ??? */
    .vs-badge {

    .opt-item.selected-a { border-color: var(--point-blue); background-color: rgba(115, 165, 255, 0.08); }

    .bar-fill-b { background: var(--point-pink); margin-left: auto; justify-content: flex-end; }

    .result-bar-names .pick-b { color: var(--point-pink); text-align: right; }

    .issue-footer-box { padding: 0 20px 20px; }

    .btn-action-v2 { border: none; padding: 13px 0; border-radius: 12px; font-size: 0.85rem; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; color: #fff; transition: 0.15s; }
    
    .btn-share-v2 { flex: 5 !important; background: linear-gradient(135deg, var(--point-blue), #5b86e5); box-shadow: 0 4px 12px rgba(115, 165, 255, 0.2); }
    .btn-like-v2 { flex: 3 !important; background-color: var(--bg-elevated); border: 1px solid var(--border-soft); }

    /* === ?? ?? ?? === */
    .comments-section { padding: 20px 20px 40px; border-top: 1px solid var(--border-soft); position: relative; }
    .comments-header { font-size: 1rem; font-weight: 800; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    
    .custom-sort-dropdown { position: relative; width: 85px; font-size: 0.82rem; font-weight: 700; color: var(--text-sub); cursor: pointer; user-select: none; }
    .sort-trigger-btn { display: flex; align-items: center; justify-content: flex-end; gap: 4px; padding: 4px 0; color: var(--text-sub); transition: 0.2s; }
    .sort-trigger-btn:hover { color: var(--text-main); }
    .sort-dropdown-menu { display: none; position: absolute; top: 110%; right: 0; background-color: #1c1c1e; border: 1px solid var(--border-card); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); z-index: 150; overflow: hidden; min-width: 95px; }

    /* ??? ??? */

    .lock-icon { font-size: 2.2rem; margin-bottom: 4px; }

    .lock-subtext { font-size: 0.8rem; color: var(--text-sub); text-align: center; line-height: 1.4; }

    .comment-input { flex: 1; background-color: var(--bg-card); border: 1px solid var(--border-soft); padding: 11px 14px; border-radius: 12px; color: #fff; font-size: 0.88rem; outline: none; font-family: inherit; }
    .comment-input:focus { border-color: var(--point-green); }
    .comment-submit { background-color: var(--point-green); color: #0a0a0c; border: none; font-weight: 800; padding: 0 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; }
    
    .comment-list { display: flex; flex-direction: column; gap: 14px; }
    .comments-empty-msg {
        font-size: 0.85rem;

    .comment-item { display: flex; flex-direction: row; gap: 10px; align-items: flex-start; width: 100%; }
        .comment-item--reply .author-pic { width: 32px !important; height: 32px !important; font-size: 0.85rem !important; }

    .comment-action-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-soft) !important; background: var(--bg-elevated) !important; color: var(--text-sub) !important; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; -webkit-appearance: none; }
    .comment-action-btn:active { transform: scale(0.95); }
    .comment-action-btn.is-liked { color: var(--point-pink) !important; border-color: var(--point-pink) !important; background: rgba(255, 133, 161, 0.1) !important; }
    
    .comment-replies { display: flex; flex-direction: column; gap: 10px; margin: 0 0 0 46px; padding-left: 12px; border-left: 2px solid rgba(74, 222, 128, 0.25); }
    .comment-inline-reply-form { display: flex; align-items: center; gap: 8px; margin: 6px 0 10px 46px; width: calc(100% - 46px); box-sizing: border-box; padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 10px; }
    .comment-replies .comment-inline-reply-form { margin-left: 0; width: 100%; }

    .comment-inline-reply-submit { background: var(--point-green) !important; color: #0a0a0c !important; border: none !important; border-radius: 10px; padding: 8px 14px; font-size: 0.8rem; font-weight: 800; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .comment-inline-reply-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .comment-inline-reply-cancel { background: var(--bg-elevated) !important; color: var(--text-sub) !important; border: 1px solid var(--border-soft) !important; border-radius: 10px; padding: 8px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; }

    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); z-index: 9998; opacity: 0; pointer-events: none; transition: 0.2s; }

    .share-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .share-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; }

    .form-select, .form-textarea { width: 100%; background: var(--bg-base); border: 1px solid var(--border-soft); color: #fff; padding: 10px; border-radius: 8px; outline: none; font-family: inherit; box-sizing: border-box; margin-bottom: 12px;}

    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

<script>
    function ensureKakaoReady() {
        if (!window.Kakao) return false;
        if (!window.Kakao.isInitialized()) {
            Kakao.init('f18676580f0d5bc2f8f6374d138bb200');
        }
        return window.Kakao.isInitialized();
    }

    function closeModals() {
        document.getElementById('detailOverlay').classList.remove('open');
        document.getElementById('shareSheet').classList.remove('open');
        document.getElementById('reportModal').classList.remove('open');
        document.getElementById('messageModal').classList.remove('open');
        if (window.PickleMessages && typeof window.PickleMessages.closeAll === 'function') {
            window.PickleMessages.closeAll();
        }
        if (window.PickleFollows && typeof window.PickleFollows.closeUserProfileModal === 'function') {
            window.PickleFollows.closeUserProfileModal();
        } else if (window.PickleProfileModal && typeof window.PickleProfileModal.close === 'function') {
            window.PickleProfileModal.close();
        }
        document.body.style.overflow = '';
    }
    function openShareSheet() {
        document.getElementById('detailOverlay').classList.add('open');
        document.getElementById('shareSheet').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function openReportModal() {
        document.getElementById('detailOverlay').classList.add('open');
        document.getElementById('reportModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function openMessageModal() {
        if (window.PickleMessages && window.PickleMessages.openCompose) {
            window.PickleMessages.openCompose();
            return;
        }
        showToastFallback('쪽지 기능을 준비 중입니다.');
    }

    async function submitDirectMessage() {
        if (window.PickleMessages && window.PickleMessages.submitDirectMessage) {
            return window.PickleMessages.submitDirectMessage();
        }
        showToastFallback('쪽지 기능을 준비 중입니다.');
    }

    function showToastFallback(msg) {
        if (window.PickleMessages && window.PickleMessages.showToast) {
            window.PickleMessages.showToast(msg);
        } else {
            alert(msg);
        }
    }

    // ??? closeModals ? ?? ?? UI? ?? ??
    async function loadProfilePopupCounts(uid) {
        document.getElementById('popupFollowerCount').textContent = '0';
        document.getElementById('popupFollowingCount').textContent = '0';
        if (!uid) return;

        try {
            if (window.supabase) {
                // 1. ?? ?? ?? (Following ??? ???? ??)
                const { count: followerCount, error: err1 } = await supabase
                    .from('follows')
                    .select('*', { count: 'exact', head: true })
                    .eq('following_id', uid);
                    
                // 2. ?? ?? ?? (Follower ??? ?? ??)
                const { count: followingCount, error: err2 } = await supabase
                    .from('follows')
                    .select('*', { count: 'exact', head: true })
                    .eq('follower_id', uid);
                    
                if (!err1 && followerCount !== null) document.getElementById('popupFollowerCount').textContent = followerCount;
                if (!err2 && followingCount !== null) document.getElementById('popupFollowingCount').textContent = followingCount;
            }
        } catch (err) {
            console.log('팔로우 수 조회 실패:', err);
        }
    }

    function toggleSortDropdownMenu(e) {
        e.stopPropagation();
        document.getElementById('sortDropdownMenu').classList.toggle('active-show');
    }

    function selectCommentSort(sortType) {
        document.getElementById('sortDropdownMenu').classList.remove('active-show');
        var label = sortType === 'latest' ? '최신순' : '인기순';
        document.getElementById('sortLabelText').textContent = label;
        
        document.getElementById('sortOptLatest').classList.toggle('current-active', sortType === 'latest');
        document.getElementById('sortOptPopular').classList.toggle('current-active', sortType === 'popular');

        try {
            var postId = new URLSearchParams(window.location.search).get('id');
            if (window.PickleDetail) {
                if (typeof window.PickleDetail.loadComments === 'function') {
                    window.PickleDetail.loadComments(postId, sortType);
                } else if (typeof window.PickleDetail.fetchComments === 'function') {
                    window.PickleDetail.fetchComments(postId, sortType);
                }
            }
        } catch (err) {
            console.error("댓글 정렬 변경 실패:", err);
        }
    }

    document.addEventListener('click', function() {
        var menu = document.getElementById('sortDropdownMenu');
        if(menu) menu.classList.remove('active-show');
    });

    function handleLikeToggle() {
        var likeBtn = document.getElementById('detailLikeBtn');
        var likeTextSpan = document.getElementById('likeCountText');
        if (!likeBtn || !likeTextSpan) return;

        var willLike = !likeBtn.classList.contains('is-liked');
        likeBtn.classList.toggle('is-liked');
        var currentCount = 0;
        var match = likeTextSpan.textContent.match(/\d+/);
        if (match) currentCount = parseInt(match[0], 10);

        if (willLike) {
            currentCount += 1;
            likeTextSpan.innerHTML = '좋아요 (' + currentCount + ')';
            likeBtn.querySelector('i').className = 'ph-fill ph-heart';

            var postId = new URLSearchParams(window.location.search).get('id');
            if (postId && window.PickleRankingEvents && typeof window.PickleRankingEvents.recordPostLike === 'function') {
                window.PickleRankingEvents.recordPostLike(postId).catch(function (err) {
                    console.warn('[P!CKLE Detail] post like record failed', err);
                });
            }
        } else {
            currentCount = Math.max(0, currentCount - 1);
            likeTextSpan.innerHTML = '좋아요 (' + currentCount + ')';
            likeBtn.querySelector('i').className = 'ph ph-heart';
        }
    }

    async function submitReport() {
        var reason = document.getElementById('reportReason').value;
        var detailEl = document.getElementById('reportDetail');
        var detail = detailEl ? detailEl.value.trim() : '';

        if (!reason) { alert('신고 사유를 선택해주세요.'); return; }
        if (!detail) { alert('상세 내용을 입력해주세요. (필수)'); return; }

        var postId = window.PickleDetail && typeof window.PickleDetail.getCurrentPostId === 'function'
            ? window.PickleDetail.getCurrentPostId() : new URLSearchParams(window.location.search).get('id');

        if (!postId) { alert('불판 정보를 찾을 수 없습니다.'); return; }

        try {
            var result = await window.PicklePenalties.submitContentReport({
                targetType: 'post', targetId: postId, reason: reason, detail: detail,
            });
            if (!result.ok) { alert('신고 접수에 실패했습니다.'); return; }
            alert('신고가 정상적으로 접수되었습니다. 검토 후 조치하겠습니다!');
            closeModals();
        } catch (err) { alert('신고 전송 실패'); }
    }

    function getSharePayload() {
        var post = (window.PickleDetail && typeof window.PickleDetail.getCurrentPost === 'function') ? window.PickleDetail.getCurrentPost() : null;
        return {
            title: (post && post.title) ? 'P!CKLE - ' + post.title : 'P!CKLE - 불판',
            text: post ? ((post.option_a || '') + ' vs ' + (post.option_b || '') + '. 지금 투표하세요!') : '지금 투표하세요!',
            imageUrl: 'https://pickleplay.kr/images/default_share.jpg'
        };
    }

    function recordDetailShare(channel) {
        var post = (window.PickleDetail && typeof window.PickleDetail.getCurrentPost === 'function') ? window.PickleDetail.getCurrentPost() : null;
        var postId = (post && post.id) || new URLSearchParams(window.location.search).get('id');
        if (postId && window.PickleRankingEvents && typeof window.PickleRankingEvents.recordPostShare === 'function') {
            window.PickleRankingEvents.recordPostShare(postId, channel);
        }
    }

    function sendKakaoMessage() {
        if (!ensureKakaoReady()) { alert('카카오톡 로딩 중...'); return; }
        var share = getSharePayload();
        var shareUrl = window.location.href;
        try {
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: share.title, description: share.text, imageUrl: share.imageUrl,
                    link: { mobileWebUrl: shareUrl, webUrl: shareUrl },
                },
                buttons: [{ title: '불판 보러가기', link: { mobileWebUrl: shareUrl, webUrl: shareUrl } }],
            });
            recordDetailShare('kakao');
            closeModals();
        } catch (e) { alert('공유 전송 실패'); }
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(function() {
            alert("불판 주소가 복사되었습니다!");
            recordDetailShare('copy');
            closeModals();
        });
    }

    function nativeShare() {
        var share = getSharePayload();
        if (navigator.share) {
            navigator.share({ title: share.title, text: share.text, url: window.location.href }).catch(console.error);
            recordDetailShare('native');
        } else { alert('링크 복사를 이용해주세요.'); }
        closeModals();
    }

    function castVote(choice, event, element) {
        if (window.PickleDetail && typeof window.PickleDetail.castVote === 'function') {
            window.PickleDetail.castVote(choice, event, element);
        }
        document.getElementById('optionsBox').style.display = 'none';
        var feedback = document.getElementById('blindFeedback');
        if (feedback) feedback.classList.add('show');
        
        var lockScreen = document.getElementById('commentLock');
        var activeArea = document.getElementById('commentActive');
        if (lockScreen) lockScreen.style.display = 'none';
        if (activeArea) activeArea.classList.add('show');
    }
</script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.1/kakao.min.js"></script>
