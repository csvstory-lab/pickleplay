<title>P!CKLE - 검색 및 탐험</title>

<style>
    :root {
        --bg-base: #0a0a0c;
        --bg-card: #1c1c1e;
        --bg-elevated: #2c2c2e;
        --point-green: #4ADE80;
        --point-pink: #FFA092;
        --point-blue: #73A5FF;
        --point-gold: #FCD34D;
        --text-main: #fcfcfc;
        --text-sub: #a1a1aa;
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-card: rgba(255, 255, 255, 0.12);
    }

    body {
        margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text-main);
        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;
        -webkit-tap-highlight-color: transparent; overflow-x: hidden;
    }

    .search-bar-container {
        position: relative;
        display: flex; align-items: center;
        background-color: var(--bg-card);
        border: 1px solid var(--border-card);
        border-radius: 20px; padding: 12px 18px;
        transition: border-color 0.25s, box-shadow 0.25s;
        margin-bottom: 24px;
    }
    .search-bar-container:focus-within {
        border-color: rgba(74, 222, 128, 0.55);
        box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12), 0 4px 20px rgba(74, 222, 128, 0.08);
    }

    .search-icon {
        font-size: 1.15rem; color: var(--text-sub); margin-right: 10px; flex-shrink: 0;
    }
    .search-input {
        flex: 1; min-width: 0; background: transparent; border: none; color: var(--text-main);
        font-family: 'Pretendard', sans-serif; font-size: 1rem; font-weight: 600; outline: none;
        padding-right: 40px;
    }
    .search-input::placeholder { color: #52525b; font-weight: 500; }
    .btn-clear {
        position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
        background: none; border: none; color: var(--text-sub); font-size: 1.15rem;
        cursor: pointer; display: none; padding: 4px; margin: 0; line-height: 1;
        transition: color 0.2s; z-index: 1;
    }
    .btn-clear:active { color: var(--point-pink); }

    main { padding: 20px 20px 120px 20px; }

    .section-title {
        font-family: 'Pretendard', sans-serif; font-size: 1.15rem; font-weight: 800;
        color: var(--text-main); margin-bottom: 14px;
        display: flex; align-items: center; gap: 8px;
    }
    .section-title .section-icon { font-size: 1.2rem; line-height: 1; }
    .section-title .icon-fire { color: var(--point-pink); }
    .section-title .icon-compass { color: var(--point-blue); }
    .section-title .icon-timer { color: var(--point-gold); }

    .trending-box {
        background-color: var(--bg-card); border-radius: 20px;
        border: 1px solid var(--border-card); padding: 4px 18px; margin-bottom: 32px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }
    .trending-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px 0; border-bottom: 1px solid var(--border-soft);
        cursor: pointer; transition: background-color 0.2s;
    }
    .trending-item:last-child { border-bottom: none; }
    .trending-item:active { background-color: rgba(255, 255, 255, 0.04); }

    .trend-left { display: flex; align-items: center; gap: 14px; }
    .trend-rank {
        font-family: 'Pretendard', sans-serif; font-size: 1.05rem; font-weight: 800;
        color: var(--text-sub); width: 22px; text-align: center;
    }
    .trend-rank.top { color: var(--point-green); }
    .trend-keyword { font-size: 0.98rem; font-weight: 700; color: #e4e4e7; }

    .trend-badge { font-size: 0.68rem; font-weight: 800; padding: 4px 9px; border-radius: 8px; }
    .badge-up { background-color: rgba(255, 160, 146, 0.15); color: var(--point-pink); }
    .badge-new { background-color: rgba(115, 165, 255, 0.15); color: var(--point-blue); }
    .badge-stay { color: #71717a; font-weight: 600; background: transparent; }

    .explore-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 36px; }
    .explore-card {
        background-color: var(--bg-elevated); border-radius: 16px; padding: 16px 14px;
        display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s;
        border: 1px solid var(--border-soft);
    }
    .explore-card:active {
        transform: scale(0.97);
        border-color: rgba(115, 165, 255, 0.45);
        background-color: rgba(115, 165, 255, 0.08);
    }
    .explore-icon {
        font-size: 1.25rem; background-color: var(--bg-card); width: 40px; height: 40px;
        display: flex; justify-content: center; align-items: center; border-radius: 50%;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35); color: var(--point-blue); flex-shrink: 0;
    }
    .explore-text { font-size: 0.92rem; font-weight: 800; color: var(--text-main); }

    /* 메인 피드와 동일한 대형 카드 */
    .list-section { padding: 0; }
    .king-card, .list-card {
        background: var(--bg-card) !important; border: 1px solid var(--border-card) !important;
        border-radius: 24px !important; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important;
        width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; overflow: hidden;
    }
    .list-card { cursor: pointer; transition: transform 0.2s; margin-bottom: 16px !important; }
    .list-card:active { transform: scale(0.98); }
    .king-card .card-body, .list-card .card-body {
        display: flex !important; flex-direction: column !important; gap: 12px !important;
        padding: 18px 20px !important;
    }
    .feed-card-meta {
        order: 1 !important; display: flex !important; justify-content: space-between !important;
        align-items: center !important; width: 100% !important; font-size: 0.78rem !important;
        font-weight: 700 !important; color: var(--text-sub) !important; margin: 0 !important;
    }
    .feed-cat-badge {
        order: 1 !important; padding: 4px 10px !important; border-radius: 6px !important;
        color: var(--text-main) !important; background: var(--bg-elevated) !important;
        border: none !important; margin-right: 6px !important; font-size: 0.72rem !important;
    }
    .feed-meta-timer {
        order: 2 !important; color: var(--point-gold) !important;
        display: inline-flex !important; align-items: center !important; gap: 4px !important;
    }
    .feed-meta-participants {
        order: 3 !important; margin-left: auto !important; color: var(--point-pink) !important;
        font-weight: 800 !important; display: inline-flex !important; align-items: center !important;
        gap: 4px !important; background: transparent !important; padding: 0 !important;
    }
    .list-card .title {
        order: 2 !important; font-size: 1.1rem !important; font-weight: 800 !important;
        line-height: 1.4 !important; margin: 4px 0 2px 0 !important; color: var(--text-main) !important;
        word-break: keep-all;
    }
    .king-ab-box, .text-vs-box {
        display: none !important; visibility: hidden !important; opacity: 0 !important;
        height: 0 !important; padding: 0 !important; margin: 0 !important;
        border: none !important; overflow: hidden !important;
    }
    .list-card .btn-pick { display: none !important; }
    .card-thumb-top {
        width: 100% !important; aspect-ratio: 16 / 9 !important; overflow: hidden !important;
        background: #000 !important; flex-shrink: 0 !important; border-bottom: 1px solid var(--border-soft) !important;
    }
    .card-thumb-top .card-thumb-img {
        width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important;
    }
    .card-thumb-top--fallback {
        display: flex !important; align-items: center !important; justify-content: center !important;
        background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%) !important;
    }
    .card-thumb-fallback-label {
        font-family: 'Pretendard', sans-serif !important; font-size: 1.2rem !important;
        text-align: center !important; padding: 0 20px !important; color: #1a1a1a !important;
        line-height: 1.45 !important; word-break: keep-all !important; font-weight: 800 !important;
    }

    /* 검색 결과 — 컴팩트 카드 */
    .poll-list { display: flex; flex-direction: column; gap: 14px; }
    .poll-card {
        background-color: var(--bg-card); border-radius: 20px;
        border: 1px solid var(--border-card); padding: 18px; cursor: pointer; transition: 0.2s;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    .poll-card:active {
        border-color: rgba(74, 222, 128, 0.4);
        transform: scale(0.98);
        background-color: rgba(74, 222, 128, 0.04);
    }
    .poll-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .poll-fire {
        font-size: 0.75rem; font-weight: 800; color: var(--point-pink);
        background: rgba(255, 160, 146, 0.12); padding: 4px 10px; border-radius: 10px;
        border: 1px solid rgba(255, 160, 146, 0.25);
        display: inline-flex; align-items: center; gap: 4px;
    }
    .poll-time {
        font-size: 0.75rem; color: var(--point-gold); background: var(--bg-elevated);
        padding: 4px 10px; border-radius: 10px; font-weight: 700;
    }
    .poll-title {
        font-size: 1.02rem; font-weight: 800; color: var(--text-main);
        line-height: 1.4; margin-bottom: 14px; word-break: keep-all;
    }
    .vs-preview { display: flex; align-items: center; gap: 10px; }
    .vs-item {
        flex: 1; background-color: var(--bg-base); border: 1px solid var(--border-soft);
        padding: 11px 10px; border-radius: 12px; text-align: center;
        font-size: 0.84rem; font-weight: 700; color: #d4d4d8;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vs-center {
        font-family: 'Pretendard', sans-serif; font-size: 0.85rem; font-weight: 800;
        color: var(--text-sub);
    }

    .search-result-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
    .result-keyword { font-size: 1.2rem; font-weight: 800; color: var(--point-green); }
    .result-count { font-size: 0.85rem; color: var(--text-sub); font-weight: 700; }
    .feed-empty { text-align: center; padding: 32px 16px; color: var(--text-sub); font-size: 0.85rem; font-weight: 600; }

    .hidden { display: none !important; }
</style>

<body data-nav-page="search">
<div id="landscape-warning" class="landscape-warning" aria-hidden="true">
    <span class="landscape-warning__icon" aria-hidden="true">📱↻</span>
    <p class="landscape-warning__title">목 돌아가요!<br>픽클은 세로로 즐겨주세요 🥒</p>
    <p class="landscape-warning__sub">P!CKLE · PORTRAIT MODE ONLY</p>
</div>

<div id="app-container">

<div id="common-header"></div>
<script src="../js/common-layout.js"></script>

<main>
    <div class="search-bar-container">
        <i class="ph ph-magnifying-glass search-icon" aria-hidden="true"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="관심있는 논쟁거리를 검색해보세요" oninput="toggleClearBtn()" onkeypress="handleEnter(event)">
        <button type="button" class="btn-clear" id="clearBtn" onclick="clearSearch()" aria-label="검색어 지우기"><i class="ph ph-x" aria-hidden="true"></i></button>
    </div>

    <div id="defaultExploreUI">

        <div class="section-title">
            <i class="ph ph-fire section-icon icon-fire" aria-hidden="true"></i>
            실시간 급상승 불판
        </div>
        <div class="trending-box" id="trendingBox"></div>

        <div class="section-title">
            <i class="ph ph-compass section-icon icon-compass" aria-hidden="true"></i>
            에디터 추천 탐험
        </div>
        <div class="explore-grid" id="exploreGrid"></div>

        <div class="section-title">
            <i class="ph ph-hourglass-high section-icon icon-timer" aria-hidden="true"></i>
            지금 터지기 직전인 불판
        </div>
        <div class="list-section" id="hotPollList"></div>
    </div>

    <div id="searchResultsUI" class="hidden">
        <div class="search-result-header">
            <div class="result-keyword" id="searchKeywordDisplay">'키워드'</div>
            <div class="result-count" id="searchResultCount">검색 결과 0건</div>
        </div>
        <div class="poll-list" id="searchResultsList"></div>
    </div>

</main>

<div id="common-footer"></div>

<script>
    function toggleClearBtn() {
        const input = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        if (input.value.length > 0) {
            clearBtn.style.display = 'block';
        } else {
            clearBtn.style.display = 'none';
            showExploreUI();
        }
    }

    function clearSearch() {
        const input = document.getElementById('searchInput');
        input.value = '';
        document.getElementById('clearBtn').style.display = 'none';
        showExploreUI();
        input.focus();
    }

    function handleEnter(event) {
        if (event.key === 'Enter') {
            const keyword = document.getElementById('searchInput').value.trim();
            if(keyword) {
                executeSearch(keyword);
            }
        }
    }

    function triggerSearch(keyword) {
        document.getElementById('searchInput').value = keyword;
        toggleClearBtn();
        executeSearch(keyword);
    }

    function executeSearch(keyword) {
        if (window.PickleSearch && window.PickleSearch.executeSearch) {
            window.PickleSearch.executeSearch(keyword);
        }
    }

    function showExploreUI() {
        if (window.PickleSearch && window.PickleSearch.showExploreUI) {
            window.PickleSearch.showExploreUI();
            return;
        }
        document.getElementById('searchResultsUI').classList.add('hidden');
        document.getElementById('defaultExploreUI').classList.remove('hidden');
        window.scrollTo(0, 0);
    }
</script>
