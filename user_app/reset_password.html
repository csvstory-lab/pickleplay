<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>P!CKLE - 비밀번호 재설정</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #09090b;
        --card-bg: #18181b;
        --neon-green: #39ff14;
        --neon-pink: #ff007f;
        --text-main: #ffffff;
        --text-sub: #a1a1aa;
        --border-color: #27272a;
        --input-bg: #2f2f32;
        --input-border: #3c3c3f;
        --input-text: #ffffff;
        --input-placeholder: #63636b;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-color); color: var(--text-main);
        font-family: 'Pretendard', sans-serif;
        max-width: 480px; margin: 0 auto;
        min-height: 100vh; min-height: 100dvh;
        display: flex; flex-direction: column; justify-content: center;
        -webkit-tap-highlight-color: transparent;
    }

    .page-wrap {
        width: 100%;
        padding: 20px 0 28px;
    }

    .hero-section {
        display: flex; flex-direction: column; align-items: center;
        text-align: center; padding: 0 20px;
        margin-bottom: 28px;
    }

    .floating-emoji {
        font-size: 2.5rem; margin-bottom: 4px;
        animation: float 3s ease-in-out infinite;
        filter: drop-shadow(0 10px 15px rgba(57, 255, 20, 0.3));
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0); }
    }

    .brand-logo {
        font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; margin: 0;
        background: linear-gradient(90deg, var(--neon-green), #aaff00);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
    }

    .brand-logo span { color: var(--neon-pink); -webkit-text-fill-color: var(--neon-pink); }

    .page-title {
        margin: 14px 0 6px;
        font-family: 'Black Han Sans', sans-serif;
        font-size: 1.45rem;
        color: #fff;
        letter-spacing: -0.5px;
    }

    .page-desc {
        margin: 0;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-sub);
        line-height: 1.5;
        word-break: keep-all;
    }

    .form-section {
        padding: 0 20px;
        display: flex; flex-direction: column; gap: 10px;
        animation: slideUp 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        transform: translateY(30px); opacity: 0;
    }

    @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }

    .email-field {
        width: 100%; padding: 16px 18px;
        min-height: 52px;
        background-color: var(--input-bg);
        border: 2px solid var(--input-border);
        border-radius: 14px;
        color: var(--input-text);
        font-family: 'Pretendard', sans-serif;
        font-size: 1.02rem; font-weight: 600;
        outline: none;
        box-shadow: 3px 3px 0 #000;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .email-field::placeholder { color: var(--input-placeholder); font-weight: 500; }

    .email-field:focus {
        border-color: var(--neon-green);
        box-shadow: 3px 3px 0 rgba(57, 255, 20, 0.25);
    }

    .email-field:disabled { opacity: 0.55; }

    .btn-submit {
        width: 100%; padding: 17px 20px;
        min-height: 54px; margin-top: 6px;
        border: 2px solid #000; border-radius: 14px;
        background: linear-gradient(90deg, var(--neon-green), #aaff00);
        color: #000;
        font-family: 'Black Han Sans', sans-serif;
        font-size: 1.15rem;
        cursor: pointer;
        box-shadow: 4px 4px 0 #000;
        transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-submit:active:not(:disabled) {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 #000;
    }

    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    .status-box {
        margin: 0 20px 16px;
        padding: 14px 16px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 700;
        line-height: 1.5;
        text-align: center;
        word-break: keep-all;
    }

    .status-box--loading {
        border: 1px solid rgba(0, 240, 255, 0.35);
        background: rgba(0, 240, 255, 0.08);
        color: #b8f7ff;
    }

    .status-box--error {
        border: 1px solid rgba(255, 0, 127, 0.4);
        background: rgba(255, 0, 127, 0.08);
        color: #ffb8d9;
    }

    .status-box--ready {
        border: 1px solid rgba(57, 255, 20, 0.35);
        background: rgba(57, 255, 20, 0.08);
        color: #c8ff9e;
    }

    .back-link {
        display: block;
        margin-top: 12px;
        text-align: center;
        color: var(--text-sub);
        font-size: 0.85rem;
        font-weight: 700;
        text-decoration: underline;
        cursor: pointer;
        background: none;
        border: none;
        width: 100%;
        font-family: 'Pretendard', sans-serif;
    }
</style>
<link rel="stylesheet" href="../css/responsive-layout.css?v=20260617_shell6">
<link rel="stylesheet" href="../css/mobile-shell.css">
</head>
<body>

<div id="app-container" class="page-wrap">
    <div class="hero-section">
        <div class="floating-emoji">🔐</div>
        <h1 class="brand-logo">P<span>!</span>CKLE</h1>
        <h2 class="page-title">새로운 비밀번호 설정</h2>
        <p class="page-desc">이메일로 받은 링크를 통해 접속하셨다면<br>새 비밀번호를 입력해 주세요.</p>
    </div>

    <div id="statusBox" class="status-box status-box--loading">재설정 링크를 확인하는 중…</div>

    <form id="resetPwForm" class="form-section" novalidate>
        <input type="password" id="newPasswordInput" class="email-field" placeholder="새 비밀번호" autocomplete="new-password" disabled>
        <input type="password" id="newPasswordConfirmInput" class="email-field" placeholder="새 비밀번호 확인" autocomplete="new-password" disabled>
        <button type="submit" id="btnResetSubmit" class="btn-submit" disabled>변경 완료</button>
        <button type="button" id="btnGoLogin" class="back-link">로그인 화면으로 돌아가기</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/pickle-system-settings.js?v=20260617_sys1"></script>
<script>
(function () {
    'use strict';

    var PASSWORD_RULE_MSG = '비밀번호는 8자 이상, 영문/숫자/특수문자를 포함해야 합니다.';
    var STRONG_PASSWORD_RE = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
    var SUCCESS_MSG = '비밀번호가 성공적으로 변경되었습니다. 다시 로그인해 주세요.';

    var isRecoveryMode = false;
    var authSubscription = null;

    var statusBox = document.getElementById('statusBox');
    var form = document.getElementById('resetPwForm');
    var pwInput = document.getElementById('newPasswordInput');
    var pwConfirmInput = document.getElementById('newPasswordConfirmInput');
    var submitBtn = document.getElementById('btnResetSubmit');
    var goLoginBtn = document.getElementById('btnGoLogin');

    function setStatus(type, message) {
        if (!statusBox) return;
        statusBox.className = 'status-box status-box--' + type;
        statusBox.textContent = message;
        statusBox.hidden = false;
    }

    function hideStatus() {
        if (statusBox) statusBox.hidden = true;
    }

    function isRecoveryHash() {
        var hash = window.location.hash.replace(/^#/, '');
        if (!hash) return false;
        var params = new URLSearchParams(hash);
        return params.get('type') === 'recovery';
    }

    function enableForm() {
        isRecoveryMode = true;
        if (pwInput) pwInput.disabled = false;
        if (pwConfirmInput) pwConfirmInput.disabled = false;
        if (submitBtn) submitBtn.disabled = false;
        setStatus('ready', '새 비밀번호를 입력한 뒤 변경 완료를 눌러 주세요.');
    }

    function disableFormWithError(message) {
        isRecoveryMode = false;
        if (pwInput) pwInput.disabled = true;
        if (pwConfirmInput) pwConfirmInput.disabled = true;
        if (submitBtn) submitBtn.disabled = true;
        setStatus('error', message);
    }

    function validatePasswords() {
        var password = pwInput ? pwInput.value : '';
        var confirm = pwConfirmInput ? pwConfirmInput.value : '';

        if (!STRONG_PASSWORD_RE.test(password)) {
            alert(PASSWORD_RULE_MSG);
            if (pwInput) pwInput.focus();
            return null;
        }
        if (password !== confirm) {
            alert('비밀번호 확인이 일치하지 않습니다.');
            if (pwConfirmInput) pwConfirmInput.focus();
            return null;
        }
        return password;
    }

    async function handlePasswordUpdate(newPassword) {
        var sb = window.PickleSupabase.getClient();
        var result = await sb.auth.updateUser({ password: newPassword });
        if (result.error) throw result.error;
        await sb.auth.signOut();
        alert(SUCCESS_MSG);
        window.location.href = 'login.html';
    }

    function bindForm() {
        if (goLoginBtn) {
            goLoginBtn.addEventListener('click', function () {
                window.location.href = 'login.html';
            });
        }

        if (!form) return;

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!isRecoveryMode) {
                alert('유효하지 않은 비밀번호 재설정 링크입니다. 이메일의 링크를 다시 확인해 주세요.');
                return;
            }

            var newPassword = validatePasswords();
            if (!newPassword) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '변경 중…';

            try {
                await handlePasswordUpdate(newPassword);
            } catch (err) {
                alert((err && err.message) ? err.message : '비밀번호 변경에 실패했습니다.');
                submitBtn.disabled = false;
                submitBtn.textContent = '변경 완료';
            }
        });
    }

    async function initResetPasswordPage() {
        bindForm();

        try {
            var sb = window.PickleSupabase.getClient();

            var authState = sb.auth.onAuthStateChange(function (event, session) {
                if (event === 'PASSWORD_RECOVERY' || (session && isRecoveryHash())) {
                    enableForm();
                }
            });
            authSubscription = authState.data && authState.data.subscription;

            var sessionResult = await sb.auth.getSession();
            var session = sessionResult.data && sessionResult.data.session;

            if (session && (isRecoveryHash() || isRecoveryMode)) {
                enableForm();
                return;
            }

            if (isRecoveryHash()) {
                setStatus('loading', '재설정 링크를 확인하는 중…');
                setTimeout(function () {
                    if (!isRecoveryMode) {
                        disableFormWithError(
                            '재설정 링크가 만료되었거나 유효하지 않습니다. 비밀번호 찾기를 다시 시도해 주세요.'
                        );
                    }
                }, 4000);
                return;
            }

            disableFormWithError(
                '비밀번호 재설정 링크로 접속해 주세요. 이메일에 포함된 링크를 눌러 이 페이지로 이동해야 합니다.'
            );
        } catch (err) {
            disableFormWithError(
                (err && err.message)
                    ? err.message
                    : '인증 모듈을 불러오지 못했습니다. 페이지를 새로고침해 주세요.'
            );
        }
    }

    document.addEventListener('DOMContentLoaded', initResetPasswordPage);

    window.addEventListener('pagehide', function () {
        if (authSubscription && typeof authSubscription.unsubscribe === 'function') {
            authSubscription.unsubscribe();
        }
    });
})();
</script>
</body>
</html>
