<!-- 🎨 폰트 및 모던 2D 라인 아이콘(Phosphor) 패키지 로드 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />

<style>
    /* 🎨 트렌디 뉴트럴 파스텔톤 지정 */
    :root {
        --bg-base: #0a0a0c;        /* 완전 깊은 블랙 배경 */
        --bg-card: #1c1c1e;        /* 구분이 명확한 다크 그레이 카드 */
        --bg-elevated: #2c2c2e;    /* 버튼/태그용 칩 컬러 */
        --point-green: #4ADE80;    /* 메인 파스텔 민트 */
        --point-pink: #FF85A1;     /* 파스텔 코랄 핑크 (참전자 수 강조) */
        --point-blue: #73A5FF;     /* 파스텔 블루 */
        --point-gold: #FCD34D;     /* 파스텔 골드 (남은 시간 강조) */
        --text-main: #fcfcfc;
        --text-sub: #a1a1aa;
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-card: rgba(255, 255, 255, 0.12);
    }

    body {
        margin: 0; padding: 0; background-color: var(--bg-base) !important; color: var(--text-main) !important;
        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;
        position: relative; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
    }

    /* === 상단 헤더 === */
    header {
        position: sticky; top: 0; background-color: rgba(10, 10, 12, 0.85); backdrop-filter: blur(15px);
        z-index: 120; border-bottom: 1px solid var(--border-soft);
    }
    .top-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
    .logo {
        font-family: 'Black Han Sans', sans-serif; font-size: 1.7rem;
        background: linear-gradient(90deg, var(--point-green), #86efac);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        cursor: pointer; margin: 0; filter: none;
    }
    .header-actions { display: flex; align-items: center; gap: 16px; }
    .btn-category {
        background-color: transparent; color: var(--text-main); border: 1px solid var(--border-soft);
        padding: 6px 14px; border-radius: 999px; font-size: 0.8rem; font-weight: 700;
        cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;
    }
    .icon-search-top { font-size: 1.35rem !important; color: var(--text-main); cursor: pointer; }
    .noti-bell { font-size: 1.45rem !important; color: var(--text-main); position: relative; cursor: pointer; display: flex; align-items: center; }
    .noti-bell[data-count]::after { 
        content: attr(data-count); position: absolute; top: -2px; right: -4px; 
        background-color: var(--point-pink); color: #000; font-size: 0.6rem; font-weight: 900; 
        padding: 2px 5px; border-radius: 10px; border: 2px solid var(--bg-base); 
    }

    /* === 오버레이 & 바텀시트 === */
    .noti-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .noti-overlay.open { opacity: 1; pointer-events: auto; }
    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background-color: var(--bg-card); border-radius: 24px 24px 0 0; padding: 25px 20px 40px; z-index: 9999; transform: translateY(100%); transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); border-top: 1px solid var(--border-soft); }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-family: 'Black Han Sans', sans-serif; font-size: 1.2rem; color: var(--point-green); }
    .btn-close { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-item { background-color: var(--bg-base); border: 1px solid var(--border-soft); padding: 12px; border-radius: 12px; text-align: center; font-size: 0.85rem; font-weight: 700; cursor: pointer; }

    /* === 메인 콘텐츠 === */
    main { padding: 20px 0 100px 0; position: relative; z-index: 1; }
    .section-header { margin-bottom: 16px; padding: 0 20px; }
    .section-title { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 1.25rem; margin: 0; color: var(--text-main); display: flex; align-items: center; gap: 6px; }

    /* 👑 오늘의 픽클 & 실시간 불판 크기 100% 일치 */
    .horizontal-scroll-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding: 0 20px 20px 20px; scrollbar-width: none; }
    .horizontal-scroll-container::-webkit-scrollbar { display: none; }

    .king-card, .list-card {
        background: var(--bg-card) !important; border: 1px solid var(--border-card) !important; border-radius: 24px !important;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important; width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; overflow: hidden;
    }
    .king-card { flex: 0 0 100% !important; scroll-snap-align: center; display: flex; flex-direction: column; }

    /* 🛠️ 레이아웃 순서 및 여백 제어 (Flex Order 강제 적용) */
    .king-card .card-body, .list-card .card-body { display: flex !important; flex-direction: column !important; gap: 12px !important; padding: 18px 20px !important; }
    
    /* 1. 메타 정보 영역 (맨 위로 이동 및 좌우 분리) */
    .feed-card-meta { 
        order: 1 !important; display: flex !important; justify-content: space-between !important; align-items: center !important; 
        width: 100% !important; font-size: 0.78rem !important; font-weight: 700 !important; color: var(--text-sub) !important; margin: 0 !important;
    }
    .feed-cat-badge { order: 1 !important; padding: 4px 10px !important; border-radius: 6px !important; color: var(--text-main) !important; background: var(--bg-elevated) !important; border: none !important; margin-right: 6px !important; font-size: 0.72rem !important;}
    
    /* [버그 수정 1] 아이콘 중복 제거 및 깔끔한 골드 컬러 정렬 */
    .feed-meta-timer { order: 2 !important; color: var(--point-gold) !important; display: inline-flex !important; align-items: center !important; gap: 4px !important; }
    
    /* 참전자 수 (오른쪽 마진 밀기 적용, 파스텔 핑크) */
    .feed-meta-participants { 
        order: 3 !important; margin-left: auto !important; color: var(--point-pink) !important; 
        font-weight: 800 !important; display: inline-flex !important; align-items: center !important; gap: 4px !important; background: transparent !important; padding: 0 !important;
    }

    /* 2. 제목 영역 (두 번째 순서) */
    .king-card .title, .list-card .title { order: 2 !important; font-size: 1.15rem !important; font-weight: 800 !important; line-height: 1.4 !important; margin: 4px 0 2px 0 !important; color: var(--text-main) !important; word-break: keep-all; }

    /* 3. A/B 투표 결과창 박스 (세 번째 순서) */
    /* 🔥🔥🔥 핵심 수정: 기존 코드를 완전히 쪼개서 킹카드의 A/B 박스만 절대적으로 숨김 처리!!! */
    .king-ab-box { display: none !important; visibility: hidden !important; opacity: 0 !important; height: 0 !important; padding: 0 !important; margin: 0 !important; border: none !important; overflow: hidden !important; } 
    
    .text-vs-box { order: 3 !important; display: flex !important; flex-wrap: wrap !important; align-items: center !important; justify-content: center !important; gap: 8px 10px !important; background: var(--bg-base) !important; border: 1px solid var(--border-soft) !important; border-radius: 14px !important; padding: 12px !important; margin: 0 !important; }
    .vs-a { color: var(--point-blue) !important; font-weight: 800 !important; }
    .vs-b { color: var(--point-pink) !important; font-weight: 800 !important; }
    .vs-label { font-size: 0.75rem !important; color: var(--text-sub) !important; font-weight: 800 !important; background: rgba(255,255,255,0.05) !important; padding: 4px 8px !important; border-radius: 8px !important; }

    /* 4. [버그 수정 2] 억지 덮어쓰기 꼼수 제거! 원본 여백과 예쁜 두께 그대로 가로 100% 꽉 채우기 */
    .btn-pick {
        order: 4 !important; 
        width: 100% !important; 
        min-width: 100% !important; 
        box-sizing: border-box !important;
        padding: 14px 16px !important; 
        border-radius: 14px !important; 
        border: none !important;
        background: var(--bg-elevated) !important; 
        color: var(--text-main) !important; /* 투명도 제거, 진짜 글자 띄움 */
        font-family: 'Pretendard', sans-serif !important; 
        font-size: 0.95rem !important; 
        font-weight: 700 !important; 
        box-shadow: none !important;
        cursor: pointer !important; 
        display: flex !important; 
        justify-content: center !important; 
        align-items: center !important; 
        transition: 0.2s !important; 
        margin-top: 4px !important;
    }
    .btn-pick:active { background: #3a3a3c !important; }

    /* 16:9 정석 비주얼 썸네일 규격 고정 */
    .card-thumb-top { width: 100% !important; aspect-ratio: 16 / 9 !important; overflow: hidden !important; background: #000 !important; flex-shrink: 0 !important; border-bottom: 1px solid var(--border-soft) !important; }
    .card-thumb-top .card-thumb-img { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; }
    .card-thumb-top--fallback { display: flex !important; align-items: center !important; justify-content: center !important; background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%) !important; }
    .card-thumb-fallback-label { font-family: 'Nanum Myeongjo', serif !important; font-size: 1.45rem !important; text-align: center !important; padding: 0 20px !important; color: #1a1a1a !important; filter: none !important; line-height: 1.45 !important; word-break: keep-all !important; font-weight: 700 !important;}

    /* 🔥 실시간 리스트 섹션 */
    .list-section { padding: 0 20px 12px; position: relative; z-index: 1; }
    .list-card { margin-bottom: 16px !important; }

    /* 📱 하단 네비게이션 바 외부 CSS 완벽 강제 진압 및 2D 아이콘 전환 */
    .bottom-nav { 
        background: rgba(28, 28, 30, 0.96) !important; border-top: 1px solid var(--border-soft) !important; 
        display: flex !important; justify-content: space-around !important; align-items: center !important; 
        padding: 10px 0 24px 0 !important; height: auto !important; position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 1000 !important; backdrop-filter: blur(15px) !important; 
    }
    .bottom-nav .nav-btn { display: flex !important; flex-direction: column !important; align-items: center !important; gap: 4px !important; color: var(--text-sub) !important; cursor: pointer !important; width: 20% !important; background: transparent !important; border: none !important; position: static !important; transform: none !important; box-shadow: none !important; border-radius: 0 !important; font-family: inherit !important;}
    .bottom-nav .nav-btn.active { color: var(--text-main) !important; }
    .bottom-nav .nav-icon { font-size: 1.45rem !important; filter: none !important; text-shadow: none !important; display: block !important; background: transparent !important; color: inherit !important; fill: currentColor !important;}
    .bottom-nav span:not(.nav-icon) { font-size: 0.7rem !important; font-weight: 700 !important; }
    
    /* 불판 생성 버튼 (중앙 플로팅 2D 완성) */
    .bottom-nav .fire-btn { transform: translateY(-12px) !important; }
    .bottom-nav .fire-btn .nav-icon { 
        background: linear-gradient(135deg, var(--point-green) 0%, #20c997 100%) !important;
        color: #000 !important; width: 46px !important; height: 46px !important; border-radius: 50% !important;
        display: flex !important; justify-content: center !important; align-items: center !important;
        border: 4px solid var(--bg-base) !important; box-shadow: 0 4px 16px rgba(74, 222, 128, 0.3) !important; font-size: 1.35rem !important;
    }
</style>
<link rel="stylesheet" href="../css/responsive-layout.css">

<body>

    <span class="landscape-warning__icon" aria-hidden="true">📱↻</span>
    <p class="landscape-warning__title">목 돌아가요!<br>픽클은 세로로 즐겨주세요 🥒</p>
    <p class="landscape-warning__sub">P!CKLE · PORTRAIT MODE ONLY</p>
</div>

<header id="mainHeader">
    <div class="top-row" id="headerTopRow">
        <h1 class="logo" onclick="PickleAuth.navigateWhenAuthReady('index.html')">P!CKLE</h1>
        <div class="header-actions">
            <button type="button" class="btn-category" onclick="toggleCategorySheet()"><i class="ph ph-list"></i> 전체 불판</button>
            <i class="ph ph-magnifying-glass icon-search-top" onclick="PickleAuth.navigateWhenAuthReady('search.html')"></i>

        </div>

    <div class="sheet-header">
        <div class="sheet-title">모든 불판 탐험 🚀</div>
        <button class="btn-close" onclick="closeAllDrawers()">✕</button>
    </div>
    <div class="category-grid" id="categoryGrid"></div>
</div>

<main>
    <!-- 👑 오늘의 픽클 섹션 -->
    <section>
        <div class="section-header">
            <h2 class="section-title"><span style="color:var(--point-gold);">👑</span> 오늘의 픽클</h2>
        </div>
        <div class="horizontal-scroll-container" id="aiCurationContainer">
            <div class="feed-loading">
                <div class="feed-spinner" aria-hidden="true"></div>
                <p>👑 오늘의 픽클을 지피는 중...</p>
            </div>
        </div>
    </section>

    <!-- 🔥 지금 뜨거운 불판 섹션 -->
    <section class="list-section">
        <div class="section-header" style="padding:0;">
            <h2 class="section-title"><span style="color:var(--point-pink);">🔥</span> 지금 뜨거운 불판</h2>
        </div>
        <div id="hotFeedList">
            <div class="feed-loading">
                <div class="feed-spinner" aria-hidden="true"></div>
                <p>🔥 뜨거운 불판을 지피는 중...</p>
            </div>
        </div>
    </section>
</main>

<!-- 📱 완벽 보완된 2D 플랫 하단바 구조 -->

    <div class="nav-btn active" onclick="PickleAuth.navigateWhenAuthReady('index.html')"><i class="ph-fill ph-house nav-icon"></i><span>홈</span></div>
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('ranking.html')"><i class="ph ph-trophy nav-icon"></i><span>랭킹</span></div>

<script src="../js/pickle-feed.js?v=0623"></script>

<script src="../js/pickle-header-legacy-cleanup.js"></script>
<script>
    function closeAllDrawers() {
        document.getElementById('commonOverlay').classList.remove('open');
        document.getElementById('categorySheet').classList.remove('open');
        document.body.style.overflow = '';
    }
    function toggleCategorySheet() {
        closeAllDrawers();
        document.getElementById('commonOverlay').classList.add('open');
        document.getElementById('categorySheet').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    // 👑 오늘의 픽클 3초 자동 오토 스크롤
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('aiCurationContainer');
        let autoScrollTimer;
        function startAutoScroll() {
            clearInterval(autoScrollTimer);
            autoScrollTimer = setInterval(() => {
                if (!container || container.children.length <= 1) return;
                const cardWidth = container.children[0].offsetWidth + 16; 
                const maxScroll = container.scrollWidth - container.clientWidth;
                if (container.scrollLeft >= maxScroll - 10) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    container.scrollBy({ left: cardWidth, behavior: 'smooth' });
                }
            }, 3000);
        }
        function stopAutoScroll() { clearInterval(autoScrollTimer); }
        container.addEventListener('touchstart', stopAutoScroll, {passive: true});
        container.addEventListener('mouseenter', stopAutoScroll);
        container.addEventListener('touchend', startAutoScroll);
        container.addEventListener('mouseleave', startAutoScroll);
        setTimeout(startAutoScroll, 2000);
    });
</script>
</body>
