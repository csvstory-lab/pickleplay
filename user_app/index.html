<style>
    /* 🎨 트렌디 뉴트럴 톤앤매너 적용 */
    :root {
        --bg-color: #050505;
        --card-bg: #18181b;
        --pastel-mint: #4ade80;
        --coral-pink: #fb7185;
        --pastel-blue: #7dd3fc;
        --soft-gold: #fde047;
        --text-main: #ffffff;
        --text-sub: #a1a1aa;
        --border-color: #27272a;
    }

    body {
        margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;
        position: relative; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
    }

    /* === 상단 헤더 === */
    header {
        position: sticky; top: 0;
        background-color: rgba(5, 5, 5, 0.85); backdrop-filter: blur(12px);
        z-index: 120;
        border-bottom: 1px solid var(--border-color);
    }
    .top-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px 10px; }
    
    /* 💡 로고 네온 효과 제거, 파스텔 그라데이션 */
    .logo {
        font-family: 'Black Han Sans', sans-serif; font-size: 2rem;
        background: linear-gradient(90deg, var(--pastel-mint), var(--pastel-blue));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        cursor: pointer; margin: 0; filter: none; 
    }
    .header-actions { display: flex; align-items: center; gap: 15px; }

    .btn-category {
        background-color: #18181b; color: #fff; border: 1px solid var(--border-color);
        padding: 6px 12px; border-radius: 999px; font-size: 0.85rem; font-weight: 700;
        cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;
    }
    .btn-category:active { background-color: var(--pastel-mint); color: #000; border-color: var(--pastel-mint); }

    .icon-search-top { font-size: 1.35rem; cursor: pointer; transition: 0.2s; }
    .icon-search-top:active { transform: scale(0.9); }

    .noti-bell { font-size: 1.45rem; position: relative; cursor: pointer; display: flex; align-items: center; transition: 0.2s;}
    .noti-bell:active { transform: scale(0.9); }
    .noti-bell[data-count]::after { 
        content: attr(data-count); position: absolute; top: -2px; right: -4px; 
        background-color: var(--coral-pink); color: white; font-size: 0.6rem; font-weight: 900; 
        padding: 2px 5px; border-radius: 10px; border: 2px solid var(--bg-color); 
    }

    /* === 모달 & 드로어 === */
    .noti-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .noti-overlay.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background-color: var(--card-bg); border-radius: 24px 24px 0 0; padding: 25px 20px 40px; z-index: 9999; transform: translateY(100%); transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); border-top: 1px solid var(--border-color); }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem; color: var(--pastel-mint); }
    .btn-close { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-item { background-color: var(--bg-color); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; text-align: center; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .grid-item:active { background-color: var(--pastel-mint); color: #000; border-color: var(--pastel-mint); }

    /* === 메인 콘텐츠 === */
    main { padding: 25px 0 100px 0; position: relative; z-index: 1; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 20px; }
    
    /* 💡 타이틀 그림자 제거 및 색상 적용 */
    .section-title { font-family: 'Pretendard', sans-serif; font-weight: 900; font-size: 1.35rem; letter-spacing: -0.5px; margin: 0; color: #fff; }
    .king-title { color: var(--coral-pink); text-shadow: none; display: flex; align-items: center; gap: 8px;}

    /* 👑 킹왕짱 레이아웃 복구 */
    .horizontal-scroll-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 0 20px 20px 20px; scrollbar-width: none; }
    .horizontal-scroll-container::-webkit-scrollbar { display: none; }

    .king-card {
        background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); flex: 0 0 auto;
        width: 88%; scroll-snap-align: center; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; transition: 0.2s;
    }
    .king-card:active { transform: scale(0.98); }
    .king-card .card-body, .list-card .card-body { display: flex; flex-direction: column; gap: 12px; padding: 16px; }

    /* 💡 필수: JS가 주입하는 썸네일 클래스 복구 */
    .card-thumb-top { width: 100%; aspect-ratio: 16 / 9; overflow: hidden; background: var(--bg-color); flex-shrink: 0; border-bottom: 1px solid var(--border-color); }
    .card-thumb-top .card-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-thumb-top--fallback { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1c1c1e, #27272a); }
    .card-thumb-fallback-label {
        font-family: 'Black Han Sans', sans-serif; font-size: clamp(1.4rem, 6vw, 2rem); line-height: 1.15; text-align: center; padding: 12px 16px;
        background: linear-gradient(135deg, var(--pastel-mint), var(--pastel-blue));
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: none; word-break: keep-all;
    }

    .king-card .title, .list-card .title { font-size: 1.15rem; font-weight: 800; line-height: 1.4; margin: 0; word-break: keep-all; color: #fff; }

    /* 💡 필수: JS가 주입하는 A/B 버튼 및 투표 버튼 복구 */
    .king-ab-box, .text-vs-box { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px 10px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-bottom: 0; }
    .king-ab-a, .vs-a { flex: 1 1 auto; color: var(--pastel-blue); font-size: 0.95rem; font-weight: 800; text-align: center; word-break: keep-all;}
    .king-ab-b, .vs-b { flex: 1 1 auto; color: var(--coral-pink); font-size: 0.95rem; font-weight: 800; text-align: center; word-break: keep-all;}
    .king-ab-vs, .vs-label { font-family: 'Black Han Sans', sans-serif; font-size: 0.85rem; color: var(--text-sub); }

    .btn-pick {
        width: 100%; padding: 14px 16px; border-radius: 12px; border: none;
        background: linear-gradient(90deg, var(--coral-pink), #f43f5e); color: white;
        font-family: 'Black Han Sans', sans-serif; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 2px;
    }
    .btn-pick:active { transform: scale(0.98); }

    /* 메타 태그 (시간, 참전자) */
    .feed-card-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 10px; margin-top: 2px; font-size: 0.78rem; font-weight: 700; color: var(--text-sub); }
    .feed-cat-badge { display: inline-flex; padding: 4px 10px; border-radius: 999px; font-size: 0.7rem; color: #d4d4d8; background: var(--border-color); }
    .feed-meta-participants { color: #000; background: var(--soft-gold); padding: 2px 8px; border-radius: 6px; font-weight: 800;}
    .feed-meta-timer { border: 1px solid var(--border-color); padding: 2px 8px; border-radius: 6px;}

    .feed-loading { padding: 36px 20px; text-align: center; color: var(--text-sub); font-size: 0.9rem; font-weight: 700; }
    .feed-spinner { width: 36px; height: 36px; margin: 0 auto 14px; border: 3px solid var(--border-color); border-top-color: var(--pastel-mint); border-radius: 50%; animation: feedSpin 0.75s linear infinite; }
    @keyframes feedSpin { to { transform: rotate(360deg); } }

    /* 🔥 실시간 리스트 */
    .list-section { padding: 0 20px 12px; position: relative; z-index: 1; }
    .list-card { display: flex; flex-direction: column; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 14px; overflow: hidden; cursor: pointer; transition: 0.2s; }

    /* 💡 하단바 네온 효과 강제 무효화 (외부 CSS 덮어쓰기) */
    .bottom-nav { background: rgba(5,5,5,0.95) !important; border-top: 1px solid var(--border-color) !important; }
    .bottom-nav .fire-btn {
        background: var(--card-bg) !important;
        border: 2px solid var(--pastel-mint) !important;
        box-shadow: 0 0 10px rgba(74, 222, 128, 0.2) !important;
        width: 55px !important; height: 55px !important;
    }
    .bottom-nav .fire-btn .nav-icon { color: var(--pastel-mint) !important; filter: none !important; text-shadow: none !important;}
</style>
<link rel="stylesheet" href="../css/responsive-layout.css">

<body>
<div id="landscape-warning" class="landscape-warning" aria-hidden="true">
    <span class="landscape-warning__icon" aria-hidden="true">📱↻</span>
    <p class="landscape-warning__title">목 돌아가요!<br>픽클은 세로로 즐겨주세요 🥒</p>
    <p class="landscape-warning__sub">P!CKLE · PORTRAIT MODE ONLY</p>
</div>

<header id="mainHeader">
    <div class="top-row" id="headerTopRow">
        <h1 class="logo" style="cursor:pointer;" onclick="PickleAuth.navigateWhenAuthReady('index.html')">P!CKLE</h1>
        <div class="header-actions">
            <button type="button" class="btn-category" onclick="toggleCategorySheet()">
                <span>≡</span> 전체 불판
            </button>
            <div class="icon-search-top" onclick="PickleAuth.navigateWhenAuthReady('search.html')">🔍</div>
            <div class="noti-bell" role="button" tabindex="0" aria-label="알림" onclick="alert('알림 기능은 준비 중입니다.')">🔔</div>
        </div>
    </div>
</header>

<div class="noti-overlay" id="commonOverlay" onclick="closeAllDrawers()"></div>

<div class="bottom-sheet" id="categorySheet">
    <div class="sheet-header">
        <div class="sheet-title">모든 불판 탐험 🚀</div>
        <button class="btn-close" onclick="closeAllDrawers()">✕</button>
    </div>
    <div class="category-grid" id="categoryGrid"></div>
</div>

<main>
    <section>
        <div class="section-header">
            <h2 class="section-title king-title">👑 오늘의 킹왕짱</h2>
        </div>
        
        <div class="horizontal-scroll-container" id="aiCurationContainer">
            <div class="feed-loading">
                <div class="feed-spinner" aria-hidden="true"></div>
                <p>🔥 킹왕짱 불판을 불러오는 중...</p>
            </div>
        </div>
    </section>

    <section class="list-section">
        <div class="section-title" style="margin-bottom: 15px;">🔥 실시간 타오르는 불판</div>
        <div id="hotFeedList">
            <div class="feed-loading">
                <div class="feed-spinner" aria-hidden="true"></div>
                <p>🔥 실시간 불판을 불러오는 중...</p>
            </div>
        </div>
    </section>
</main>

<nav class="bottom-nav">
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('ranking.html')"><span class="nav-icon">🏆</span><span>랭킹</span></div>
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('event.html')"><span class="nav-icon">🎁</span><span>이벤트</span></div>
    <div class="nav-btn fire-btn" onclick="PickleAuth.navigateWhenAuthReady('create.html')"><span class="nav-icon" style="background:transparent;">🔥</span></div>
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('search.html')"><span class="nav-icon">🔍</span><span>검색</span></div>
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('mypage.html')"><span class="nav-icon">👤</span><span>마이</span></div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>

<script src="../js/supabase-client.js"></script>

<script src="../js/media-upload.js"></script>
<script src="../js/pickle-media-view.js"></script>

<script src="../js/mobile-touch-guard.js"></script>
<script src="../js/pickle-header-legacy-cleanup.js"></script>
<script>
    function closeAllDrawers() {
        document.getElementById('commonOverlay').classList.remove('open');
        document.getElementById('categorySheet').classList.remove('open');
        document.body.style.overflow = '';
    }
    function toggleCategorySheet() {
        closeAllDrawers();
        document.getElementById('commonOverlay').classList.add('open');
        document.getElementById('categorySheet').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    // 킹왕짱 3초 롤링
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('aiCurationContainer');
        let autoScrollTimer;
        function startAutoScroll() {
            clearInterval(autoScrollTimer);
            autoScrollTimer = setInterval(() => {
                if (!container || container.children.length <= 1) return;
                const cardWidth = container.children[0].offsetWidth + 15; 
                const maxScroll = container.scrollWidth - container.clientWidth;
                if (container.scrollLeft >= maxScroll - 10) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    container.scrollBy({ left: cardWidth, behavior: 'smooth' });
                }
            }, 3000);
        }
        function stopAutoScroll() { clearInterval(autoScrollTimer); }
        container.addEventListener('touchstart', stopAutoScroll, {passive: true});
        container.addEventListener('mouseenter', stopAutoScroll);
        container.addEventListener('touchend', startAutoScroll);
        container.addEventListener('mouseleave', startAutoScroll);
        setTimeout(startAutoScroll, 2000);
    });
</script>
</body>
