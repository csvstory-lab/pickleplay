<style>
    /* 🎨 트렌디 뉴트럴 톤앤매너 적용 */
    :root {
        --bg-base: #0a0a0c;
        --bg-card: #1c1c1e;
        --bg-elevated: #2c2c2e;
        --point-green: #4ADE80;
        --point-pink: #FF85A1;
        --point-blue: #73A5FF;
        --point-gold: #FCD34D;
        --text-main: #fcfcfc;
        --text-sub: #a1a1aa;
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-card: rgba(255, 255, 255, 0.12);
    }

    body {
        margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text-main);
        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;
        position: relative; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
    }

    /* === 상단 헤더 (로고, 전체불판, 검색, 알림) === */
    header {
        position: sticky; top: 0;
        background-color: rgba(10, 10, 12, 0.85); backdrop-filter: blur(15px);
        z-index: 120; border-bottom: 1px solid var(--border-soft);
        display: flex; justify-content: space-between; align-items: center; padding: 12px 20px;
    }
    
    .logo {
        font-family: 'Black Han Sans', sans-serif; font-size: 1.6rem;
        background: linear-gradient(90deg, var(--point-green), #86efac);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        cursor: pointer; margin: 0; filter: none; 
    }
    .header-actions { display: flex; align-items: center; gap: 14px; }

    .btn-category {
        background-color: transparent; color: var(--text-main); border: 1px solid var(--border-soft);
        padding: 6px 12px; border-radius: 999px; font-size: 0.8rem; font-weight: 700;
        cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;
    }

    .icon-search-top { font-size: 1.3rem; cursor: pointer; }
    .noti-bell { font-size: 1.4rem; position: relative; cursor: pointer; display: flex; align-items: center;}
    .noti-bell[data-count]::after { 
        content: attr(data-count); position: absolute; top: -2px; right: -4px; 
        background-color: var(--point-pink); color: #000; font-size: 0.6rem; font-weight: 900; 
        padding: 2px 5px; border-radius: 10px; border: 2px solid var(--bg-base); 
    }

    /* === 메인 콘텐츠 === */
    main { padding: 20px 0 100px 0; position: relative; z-index: 1; }
    .section-header { margin-bottom: 12px; padding: 0 20px; }
    .section-title { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 1.15rem; margin: 0; display: flex; align-items: center; gap: 6px; color: var(--text-main); }

    /* 👑 오늘의 픽클 (크기 100% 통일) */
    .horizontal-scroll-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding: 0 20px 20px 20px; scrollbar-width: none; }
    .horizontal-scroll-container::-webkit-scrollbar { display: none; }

    .king-card {
        background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); 
        flex: 0 0 100%; /* 🔥 카드를 100%로 꽉 채워 아래 리스트와 크기 동일하게 만듦 */
        scroll-snap-align: center; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; transition: 0.2s;
    }

    /* 🔥 JS 수정 없이 레이아웃 순서 바꾸기 (Flex Order) */
    .king-card .card-body, .list-card .card-body { display: flex; flex-direction: column; gap: 10px; padding: 16px 20px; }
    .feed-card-meta { order: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 8px 10px; font-size: 0.75rem; font-weight: 700; color: var(--text-sub); }
    .king-card .title, .list-card .title { order: 2; font-size: 1.1rem; font-weight: 800; line-height: 1.4; margin: 0; color: var(--text-main); word-break: keep-all;}
    .king-ab-box, .text-vs-box { order: 3; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px 10px; background: var(--bg-base); border: 1px solid var(--border-soft); border-radius: 12px; padding: 12px; margin-bottom: 0; }
    
    /* 🔥 JS 수정 없이 "내 픽 남기기" 텍스트 & 그레이 톤 변경 (CSS Content) */
    .btn-pick {
        order: 3; width: 100%; padding: 14px 16px; border-radius: 12px; border: none;
        background: var(--bg-elevated) !important; color: transparent !important; /* 기존 빨간색, 글자 숨김 */
        cursor: pointer; transition: 0.2s; position: relative; display: flex; justify-content: center; align-items: center;
    }
    .btn-pick::after {
        content: "✔️ 내 픽 남기기"; position: absolute;
        color: var(--text-main); font-family: 'Pretendard', sans-serif; font-size: 0.95rem; font-weight: 700;
    }
    .btn-pick:active { background: #3a3a3c !important; }

    /* 메타 태그 라벨 디자인 */
    .feed-cat-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; color: var(--text-main); background: var(--bg-elevated); }
    .feed-meta-participants { color: var(--point-pink); display: flex; align-items: center; gap: 4px; font-weight: 800;}
    .feed-meta-timer { color: var(--point-gold); display: flex; align-items: center; gap: 4px;}

    /* 썸네일 레이아웃 */
    .card-thumb-top { width: 100%; aspect-ratio: 16 / 9; overflow: hidden; background: #000; flex-shrink: 0; border-bottom: 1px solid var(--border-soft); }
    .card-thumb-top .card-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-thumb-top--fallback { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%); }
    .card-thumb-fallback-label { font-family: 'Nanum Myeongjo', serif; font-size: 1.5rem; text-align: center; padding: 0 16px; color: #1a1a1a; filter: none; line-height: 1.4; word-break: keep-all; }

    .king-ab-a, .vs-a { flex: 1 1 auto; color: var(--point-blue); font-size: 0.95rem; font-weight: 800; text-align: center;}
    .king-ab-b, .vs-b { flex: 1 1 auto; color: var(--point-pink); font-size: 0.95rem; font-weight: 800; text-align: center;}
    .king-ab-vs, .vs-label { font-size: 0.75rem; color: var(--text-sub); font-weight: 800; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 8px;}

    .feed-loading { padding: 36px 20px; text-align: center; color: var(--text-sub); font-size: 0.9rem; font-weight: 700; }
    .feed-spinner { width: 36px; height: 36px; margin: 0 auto 14px; border: 3px solid var(--border-soft); border-top-color: var(--point-green); border-radius: 50%; animation: feedSpin 0.75s linear infinite; }
    @keyframes feedSpin { to { transform: rotate(360deg); } }

    /* 🔥 지금 뜨거운 불판 리스트 */
    .list-section { padding: 0 20px 12px; position: relative; z-index: 1; }
    .list-card { display: flex; flex-direction: column; background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 20px; margin-bottom: 16px; overflow: hidden; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }

    /* 💡 하단바 외부 CSS 완벽 무력화 & 2D 스타일 적용 */
    .bottom-nav { background: rgba(28, 28, 30, 0.95) !important; border-top: 1px solid var(--border-soft) !important; display: flex !important; justify-content: space-around !important; align-items: center !important; padding: 10px 0 20px 0 !important; height: auto !important; position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 1000 !important; backdrop-filter: blur(15px); }
    .bottom-nav .nav-btn { display: flex !important; flex-direction: column !important; align-items: center !important; gap: 4px !important; color: var(--text-sub) !important; cursor: pointer !important; width: 20% !important; background: transparent !important; border: none !important; position: static !important; transform: none !important; box-shadow: none !important; border-radius: 0 !important; }
    .bottom-nav .nav-btn.active { color: var(--text-main) !important; }
    .bottom-nav .nav-btn.active .nav-icon { color: var(--text-main) !important; }
    .bottom-nav .nav-icon { font-size: 1.5rem !important; filter: none !important; text-shadow: none !important; display: block !important; background: transparent !important;}
    .bottom-nav span:not(.nav-icon) { font-size: 0.7rem !important; font-weight: 700 !important; }
    
    /* 불판 생성 중앙 버튼 하이라이트 */
    .bottom-nav .fire-btn { transform: translateY(-12px) !important; }
    .bottom-nav .fire-btn .nav-icon { 
        background: linear-gradient(135deg, var(--point-green) 0%, #20c997 100%) !important;
        color: #000 !important; width: 48px !important; height: 48px !important; border-radius: 50% !important;
        display: flex !important; justify-content: center !important; align-items: center !important;
        border: 4px solid var(--bg-base) !important; box-shadow: 0 4px 16px rgba(74, 222, 128, 0.3) !important; font-size: 1.4rem !important;
    }
</style>
<link rel="stylesheet" href="../css/responsive-layout.css">
<link rel="stylesheet" href="../css/mobile-shell.css">

<body>
<div id="landscape-warning" class="landscape-warning" aria-hidden="true">
    <span class="landscape-warning__icon" aria-hidden="true">📱↻</span>
    <p class="landscape-warning__title">목 돌아가요!<br>픽클은 세로로 즐겨주세요 🥒</p>
    <p class="landscape-warning__sub">P!CKLE · PORTRAIT MODE ONLY</p>
</div>

<header id="mainHeader">
    <h1 class="logo" onclick="PickleAuth.navigateWhenAuthReady('index.html')">P!CKLE</h1>
    <div class="header-actions">
        <button type="button" class="btn-category" onclick="alert('전체 카테고리 오픈 예정')"><span>≡</span> 전체 불판</button>
        <div class="icon-search-top" onclick="PickleAuth.navigateWhenAuthReady('search.html')">🔍</div>
        <div class="noti-bell" role="button" tabindex="0" onclick="alert('알림 준비 중')">🔔</div>
    </div>
</header>

<main>
    <section>
        <div class="section-header">
            <h2 class="section-title"><span style="color:var(--point-gold);">👑</span> 오늘의 픽클</h2>
        </div>
        <div class="horizontal-scroll-container" id="aiCurationContainer">
            <div class="feed-loading">
                <div class="feed-spinner" aria-hidden="true"></div>
                <p>🔥 오늘의 픽클을 불러오는 중...</p>
            </div>
        </div>
    </section>

    <section class="list-section">
        <div class="section-header" style="padding:0; margin-top:10px;">
            <h2 class="section-title"><span style="color:var(--point-pink);">🔥</span> 지금 뜨거운 불판</h2>
        </div>
        <div id="hotFeedList">
            <div class="feed-loading">
                <div class="feed-spinner" aria-hidden="true"></div>
                <p>🔥 뜨거운 불판을 불러오는 중...</p>
            </div>
        </div>
    </section>
</main>

<nav class="bottom-nav">
    <div class="nav-btn active" onclick="PickleAuth.navigateWhenAuthReady('index.html')"><span class="nav-icon">🏠</span><span>홈</span></div>
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('ranking.html')"><span class="nav-icon">🏆</span><span>랭킹</span></div>
    <div class="nav-btn fire-btn" onclick="PickleAuth.navigateWhenAuthReady('create.html')"><span class="nav-icon">🔥</span></div>
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('event.html')"><span class="nav-icon">🎁</span><span>이벤트</span></div>
    <div class="nav-btn" onclick="PickleAuth.navigateWhenAuthReady('mypage.html')"><span class="nav-icon">👤</span><span>마이</span></div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/pickle-header-legacy-cleanup.js"></script>
<script>
    // 오늘의 픽클 3초 롤링
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('aiCurationContainer');
        let autoScrollTimer;
        function startAutoScroll() {
            clearInterval(autoScrollTimer);
            autoScrollTimer = setInterval(() => {
                if (!container || container.children.length <= 1) return;
                const cardWidth = container.children[0].offsetWidth + 16; 
                const maxScroll = container.scrollWidth - container.clientWidth;
                if (container.scrollLeft >= maxScroll - 10) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    container.scrollBy({ left: cardWidth, behavior: 'smooth' });
                }
            }, 3000);
        }
        function stopAutoScroll() { clearInterval(autoScrollTimer); }
        container.addEventListener('touchstart', stopAutoScroll, {passive: true});
        container.addEventListener('mouseenter', stopAutoScroll);
        container.addEventListener('touchend', startAutoScroll);
        container.addEventListener('mouseleave', startAutoScroll);
        setTimeout(startAutoScroll, 2000);
    });
</script>
