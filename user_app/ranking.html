<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>P!CKLE - 랭킹</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #fef9c3;
        --card-bg: #ffffff;
        --neon-green: #39ff14;
        --neon-pink: #ff007f;
        --neon-blue: #00f0ff;
        --text-main: #0a0a0a;
        --text-sub: #52525b;
        --border-color: #0a0a0a;
        --brutal-border: 3px solid #0a0a0a;
        --brutal-shadow: 4px 4px 0 #0a0a0a;
        --brutal-shadow-lg: 6px 6px 0 #0a0a0a;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-color);
        background-image: radial-gradient(circle at 20% 20%, rgba(57,255,20,0.15) 0%, transparent 45%),
                          radial-gradient(circle at 80% 0%, rgba(255,0,127,0.12) 0%, transparent 40%);
        color: var(--text-main);
        font-family: 'Pretendard', sans-serif;
        max-width: 480px; margin: 0 auto;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
    }

    header {
        position: sticky; top: 0; width: 100%;
        background-color: var(--card-bg);
        border-bottom: var(--brutal-border);
        z-index: 900;
        transition: top 0.3s ease-in-out;
        box-shadow: 0 4px 0 #0a0a0a;
    }
    .top-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px 10px; }
    .logo {
        font-family: 'Black Han Sans', sans-serif; font-size: 2rem;
        color: #0a0a0a; margin: 0; cursor: pointer;
        text-shadow: 3px 3px 0 var(--neon-green);
    }
    .header-actions { display: flex; align-items: center; gap: 15px; }
    .noti-bell { font-size: 1.5rem; position: relative; cursor: pointer; transition: 0.2s; }
    .noti-bell:active { transform: translate(2px, 2px); }

    main { padding: 20px 16px 180px; transition: all 0.3s ease; }

    .page-title {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 1.75rem; margin: 0 0 20px 0;
        text-align: center; letter-spacing: -0.5px;
        background: #0a0a0a; color: #fff;
        padding: 12px 16px;
        border: var(--brutal-border);
        box-shadow: var(--brutal-shadow);
        transform: rotate(-1deg);
    }

    /* 메인 탭 — 네오브루탈 */
    .main-tab-wrapper {
        display: flex; gap: 8px; margin-bottom: 24px;
    }
    .main-tab {
        flex: 1; text-align: center; padding: 14px 8px;
        font-weight: 900; font-size: 0.92rem;
        cursor: pointer; font-family: inherit;
        background: var(--card-bg);
        border: var(--brutal-border);
        box-shadow: var(--brutal-shadow);
        transition: transform 0.15s, box-shadow 0.15s;
    }
    .main-tab:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #0a0a0a; }
    .main-tab.active { transform: translate(-2px, -2px); }

    main.theme-grill .main-tab#tabGrill.active {
        background: var(--neon-pink); color: #fff;
        box-shadow: var(--brutal-shadow-lg);
    }
    main.theme-pickler .main-tab#tabPickler.active {
        background: var(--neon-blue); color: #0a0a0a;
        box-shadow: var(--brutal-shadow-lg);
    }

    main.theme-grill .podium-score,
    main.theme-grill .rank-score { color: var(--neon-pink); }
    main.theme-pickler .podium-score,
    main.theme-pickler .rank-score { color: #0077aa; }

    /* Top 3 시상대 */
    .podium-container {
        display: flex; justify-content: center; align-items: flex-end;
        gap: 8px; margin-bottom: 28px; min-height: 200px; margin-top: 20px;
    }

    .podium-item {
        display: flex; flex-direction: column; align-items: center;
        width: 30%; position: relative; cursor: pointer;
        transition: transform 0.15s;
    }
    .podium-item:active { transform: translate(2px, 2px); }

    .neo-top {
        border: var(--brutal-border) !important;
        box-shadow: var(--brutal-shadow-lg) !important;
    }

    .podium-crown {
        position: absolute; top: -52px; font-size: 1.6rem;
        filter: drop-shadow(2px 2px 0 #0a0a0a);
        z-index: 20;
        animation: crown-bob 2s ease-in-out infinite;
    }
    @keyframes crown-bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
    }

    .podium-avatar {
        width: 56px; height: 56px; border-radius: 50%;
        background-color: #fff; display: flex;
        justify-content: center; align-items: center;
        font-size: 1.6rem; font-weight: 900;
        border: var(--brutal-border);
        box-shadow: 3px 3px 0 #0a0a0a;
        position: absolute; top: -38px; z-index: 10;
        overflow: hidden;
    }
    .podium-avatar--post { border-radius: 10px; }

    .podium-rank {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 1.4rem; color: #0a0a0a; margin-top: auto;
        margin-bottom: 8px;
    }
    .podium-name {
        font-weight: 900; font-size: 0.78rem; text-align: center;
        margin-top: 32px; color: #0a0a0a;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        width: 100%; padding: 0 4px;
    }
    .podium-score {
        font-size: 0.72rem; font-weight: 900; margin-top: 4px;
        margin-bottom: 6px;
    }

    .podium-1 {
        height: 140px; width: 36%; z-index: 5;
        background: #ffcc00;
        border-top-left-radius: 4px; border-top-right-radius: 4px;
        border-bottom: none;
    }
    .podium-1 .podium-avatar { width: 68px; height: 68px; font-size: 2rem; top: -48px; }
    .podium-1 .podium-name { font-size: 0.85rem; margin-top: 38px; }
    .podium-1 .podium-score { color: #0a0a0a !important; }

    .podium-2 {
        height: 110px; background: #e4e4e7;
        border-top-left-radius: 4px; border-top-right-radius: 4px;
        border-bottom: none;
    }
    .podium-3 {
        height: 88px; background: #fdba74;
        border-top-left-radius: 4px; border-top-right-radius: 4px;
        border-bottom: none;
    }

    /* 리스트 */
    .ranking-list { display: flex; flex-direction: column; gap: 12px; }

    .neo-card {
        background: var(--card-bg);
        border: var(--brutal-border);
        box-shadow: var(--brutal-shadow);
        border-radius: 0;
        transition: transform 0.15s;
    }
    .neo-card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #0a0a0a; }

    .rank-item {
        display: flex; align-items: center;
        padding: 14px; gap: 12px; cursor: pointer;
    }
    .rank-num {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 1.1rem; color: var(--text-sub);
        width: 28px; text-align: center; flex-shrink: 0;
    }
    .rank-pic {
        width: 44px; height: 44px; border-radius: 50%;
        background-color: #fef08a;
        border: 2px solid #0a0a0a;
        display: flex; justify-content: center; align-items: center;
        font-size: 1.2rem; font-weight: 900; flex-shrink: 0;
        overflow: hidden;
    }
    .rank-item.grill .rank-pic { border-radius: 8px; }

    .rank-info { flex: 1; overflow: hidden; min-width: 0; }
    .rank-title {
        font-weight: 900; font-size: 0.9rem;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        margin-bottom: 4px;
    }
    .rank-sub { font-size: 0.72rem; color: var(--text-sub); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .rank-score {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 0.95rem; flex-shrink: 0;
        display: flex; align-items: center; gap: 4px;
    }

    .grade-badge {
        display: inline-block; font-size: 0.65rem; font-weight: 900;
        background: #0a0a0a; color: var(--neon-green);
        padding: 2px 6px; border: 2px solid #0a0a0a;
        margin-left: 4px; vertical-align: middle;
    }

    .rank-empty, .rank-loading {
        text-align: center; padding: 32px 16px;
        font-weight: 800; color: var(--text-sub);
        background: var(--card-bg);
        border: var(--brutal-border);
        box-shadow: var(--brutal-shadow);
    }
    .rank-empty--list { padding: 16px; font-size: 0.85rem; margin-top: 8px; }

    .hidden { display: none !important; }

    /* 내 순위 Sticky 바 */
    .self-rank-bar {
        position: fixed;
        left: 0; right: 0; bottom: calc(72px + env(safe-area-inset-bottom));
        max-width: 480px; margin: 0 auto;
        padding: 0 12px 10px;
        z-index: 850;
        pointer-events: none;
    }
    .self-rank-inner {
        display: flex; justify-content: space-between; align-items: center;
        padding: 14px 16px; gap: 12px;
        pointer-events: auto;
    }
    .self-rank-inner.theme-grill { border-left: 6px solid var(--neon-pink); }
    .self-rank-inner.theme-pickler { border-left: 6px solid var(--neon-blue); }

    .self-rank-left { display: flex; flex-direction: column; gap: 2px; }
    .self-rank-label { font-size: 0.7rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; }
    .self-rank-num { font-family: 'Black Han Sans', sans-serif; font-size: 1.4rem; }
    .self-rank-right { text-align: right; flex: 1; min-width: 0; }
    .self-rank-name {
        display: block; font-weight: 900; font-size: 0.85rem;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .self-rank-score { font-family: 'Black Han Sans', sans-serif; font-size: 1rem; }
    .self-rank-msg { font-size: 0.82rem; font-weight: 800; color: var(--text-sub); }
    .self-rank-msg a { color: #0a0a0a; font-weight: 900; }

    /* 하단 네비 */
    .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%; max-width: 480px;
        margin: 0 auto; right: 0;
        background-color: #fff;
        border-top: var(--brutal-border);
        display: flex; justify-content: space-around; align-items: center;
        padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
        z-index: 900;
        box-shadow: 0 -4px 0 #0a0a0a;
    }
    .nav-btn {
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        color: #71717a; font-size: 0.72rem; font-weight: 900; cursor: pointer;
    }
    .nav-icon { font-size: 1.35rem; }
    .nav-btn.active { color: #0a0a0a; }
    .nav-btn.fire-btn .nav-icon {
        background-color: var(--neon-green);
        width: 44px; height: 44px;
        display: flex; justify-content: center; align-items: center;
        border-radius: 50%; color: #0a0a0a;
        font-size: 1.5rem; transform: translateY(-8px);
        border: 3px solid #0a0a0a;
        box-shadow: 3px 3px 0 #0a0a0a;
    }

    /* 알림 드로어 */
    .noti-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .noti-overlay.open { opacity: 1; pointer-events: auto; }
    .noti-drawer {
        position: fixed; top: 0; right: 0; bottom: 0; width: 85%; max-width: 400px;
        background: #fff; z-index: 9999;
        transform: translateX(100%); transition: transform 0.3s;
        border-left: var(--brutal-border);
        box-shadow: -6px 0 0 #0a0a0a;
    }
    .noti-drawer.open { transform: translateX(0); }
    .noti-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: var(--brutal-border); }
    .noti-title { font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem; margin: 0; }
    .btn-close-drawer { background: none; border: none; font-size: 1.4rem; cursor: pointer; font-weight: 900; }

    .bottom-sheet {
        position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
        background: #fff; padding: 25px 20px 40px; z-index: 9999;
        transform: translateY(100%); transition: transform 0.3s;
        border-top: var(--brutal-border);
        box-shadow: 0 -6px 0 #0a0a0a;
    }
    .bottom-sheet.open { transform: translateY(0); }
    .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 50vh; overflow-y: auto; }
    .grid-item {
        background: #fef08a; padding: 12px; text-align: center;
        font-size: 0.88rem; font-weight: 900; cursor: pointer;
        border: 2px solid #0a0a0a; box-shadow: 3px 3px 0 #0a0a0a;
    }
    .grid-item:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #0a0a0a; }
</style>
<link rel="stylesheet" href="../css/responsive-layout.css">
</head>
<body>

<header id="mainHeader">
    <div class="top-row">
        <h1 class="logo" onclick="location.href='index.html'">P!CKLE</h1>
        <div class="header-actions">
            <div class="noti-bell" role="button" tabindex="0" aria-label="알림">🔔</div>
        </div>
    </div>
</header>

<div class="noti-overlay" id="notiOverlay" onclick="closeAllDrawers()"></div>
<div class="noti-drawer" id="notiDrawer">
    <div class="noti-header">
        <h2 class="noti-title">알림</h2>
        <button class="btn-close-drawer" onclick="closeAllDrawers()">✕</button>
    </div>
    <div style="padding: 20px; color: var(--text-sub); text-align: center;">새로운 알림이 없습니다.</div>
</div>

<div class="bottom-sheet" id="categorySheet">
    <div class="noti-header" style="padding: 0 0 20px 0; border:none;">
        <h2 class="noti-title">모든 불판 탐험 🚀</h2>
        <button class="btn-close-drawer" onclick="closeAllDrawers()">✕</button>
    </div>
    <div class="category-grid" id="categoryGrid"></div>
</div>

<main class="theme-grill">
    <h1 class="page-title">🏆 P!CKLE 랭킹</h1>

    <div class="main-tab-wrapper">
        <button type="button" class="main-tab active" id="tabGrill" onclick="switchMainTab('grill')">🔥 가장 핫한 불판</button>
        <button type="button" class="main-tab" id="tabPickler" onclick="switchMainTab('pickler')">😎 최고의 픽클러</button>
    </div>

    <div id="grillRankingArea">
        <div class="podium-container" id="grillPodium">
            <p class="rank-loading">🏆 랭킹 집계 중...</p>
        </div>
        <div class="ranking-list" id="grillList"></div>
    </div>

    <div id="picklerRankingArea" class="hidden">
        <div class="podium-container" id="picklerPodium">
            <p class="rank-loading">🏆 랭킹 집계 중...</p>
        </div>
        <div class="ranking-list" id="picklerList"></div>
    </div>
</main>

<div class="self-rank-bar hidden" id="selfRankBar" aria-live="polite"></div>

<nav class="bottom-nav">
    <div class="nav-btn active" onclick="location.href='ranking.html'"><span class="nav-icon">🏆</span><span>랭킹</span></div>
    <div class="nav-btn" onclick="location.href='event.html'"><span class="nav-icon">🎁</span><span>이벤트</span></div>
    <div class="nav-btn fire-btn" onclick="location.href='create.html'"><span class="nav-icon">🔥</span><span>불판</span></div>
    <div class="nav-btn" onclick="location.href='search.html'"><span class="nav-icon">🔍</span><span>검색</span></div>
    <div class="nav-btn" onclick="location.href='mypage.html'"><span class="nav-icon">👤</span><span>마이</span></div>
</nav>

<script>
    function closeAllDrawers() {
        document.getElementById('notiDrawer').classList.remove('open');
        document.getElementById('categorySheet').classList.remove('open');
        document.getElementById('notiOverlay').classList.remove('open');
        document.body.style.overflow = '';
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/pickle-inapp-browser.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/pickle-notifications.js"></script>
<script src="../js/pickle-profile.js"></script>
<script src="../js/pickle-categories.js"></script>
<script src="../js/pickle-ranking-events.js"></script>
<script src="../js/pickle-ranking.js"></script>

</body>
</html>
