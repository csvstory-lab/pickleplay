<style>

    :root {

        --bg-base: #0a0a0c;

        --bg-card: #1c1c1e;

        --bg-elevated: #2c2c2e;

        --point-green: #4ADE80;

        --point-pink: #FFA092;

        --point-blue: #73A5FF;

        --point-gold: #FCD34D;

        --text-main: #fcfcfc;

        --text-sub: #a1a1aa;

        --border-soft: rgba(255, 255, 255, 0.08);

        --border-card: rgba(255, 255, 255, 0.12);

    }



    body {

        margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text-main);

        font-family: 'Pretendard', sans-serif; max-width: 480px; margin: 0 auto;

        position: relative; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;

    }



    .category-nav-scroll {

        display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 12px;

        scrollbar-width: none; -webkit-overflow-scrolling: touch;

        position: relative; z-index: 1;

    }

    .category-nav-scroll::-webkit-scrollbar { display: none; }

    .category-nav-tab {

        flex-shrink: 0; border: 1px solid var(--border-card); background: var(--bg-card);

        color: var(--text-sub); padding: 8px 14px; border-radius: 999px;

        font-size: 0.78rem; font-weight: 800; cursor: pointer; transition: 0.2s;

        font-family: inherit; white-space: nowrap;

    }

    .category-nav-tab.active {

        border-color: rgba(74, 222, 128, 0.5); color: #0a0a0c; background: var(--point-green);

        box-shadow: 0 0 14px rgba(74, 222, 128, 0.2);

    }

    .category-nav-tab:active { transform: scale(0.96); }

    .category-nav-tab--seasonal {

        border-color: rgba(74, 222, 128, 0.35);

    }

    a.category-nav-tab {

        text-decoration: none; color: var(--text-sub);

        display: inline-flex; align-items: center;

    }

    a.category-nav-tab.active { color: #0a0a0c; }



    main { padding: 18px 0 100px; position: relative; z-index: 1; }



    .page-header { padding: 0 20px 16px; position: relative; z-index: 20; }

    .page-header-row {

        display: flex; align-items: center; justify-content: space-between;

        gap: 10px; flex-wrap: nowrap;

    }

    .page-title {

        font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 1.15rem;

        letter-spacing: -0.02em; margin: 0; color: var(--text-main);

        flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

        display: flex; align-items: center; gap: 6px;

    }

    .page-title-icon { color: var(--point-pink); font-size: 1.1rem; flex-shrink: 0; }

    .page-header-controls {

        display: flex; align-items: center; gap: 8px; flex-shrink: 0;

        position: relative; z-index: 30;

    }



    .unseen-toggle {

        display: inline-flex; align-items: center; gap: 6px;

        cursor: pointer; user-select: none; margin: 0;

    }

    .unseen-toggle-label {

        font-size: 0.62rem; font-weight: 800; color: var(--text-sub);

        white-space: nowrap; letter-spacing: -0.02em;

        display: inline-flex; align-items: center; gap: 4px;

    }

    .unseen-toggle-label i { font-size: 0.85rem; color: var(--point-blue); }

    .unseen-toggle-input {

        position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;

    }

    .unseen-toggle-track {

        position: relative; width: 36px; height: 20px; flex-shrink: 0;

        background: var(--bg-elevated); border: 1px solid var(--border-card); border-radius: 999px;

        transition: background 0.2s, border-color 0.2s;

    }

    .unseen-toggle-track::after {

        content: ''; position: absolute; top: 2px; left: 2px;

        width: 14px; height: 14px; border-radius: 50%;

        background: #71717a; transition: transform 0.22s cubic-bezier(0.1, 0.9, 0.2, 1), background 0.2s;

    }

    .unseen-toggle-input:checked + .unseen-toggle-track {

        background: rgba(74, 222, 128, 0.2); border-color: rgba(74, 222, 128, 0.45);

    }

    .unseen-toggle-input:checked + .unseen-toggle-track::after {

        transform: translateX(16px); background: var(--point-green);

    }



    .sort-dropdown {

        position: relative; flex-shrink: 0; z-index: 40;

    }

    .sort-dropdown-trigger {

        display: inline-flex; align-items: center; justify-content: space-between;

        gap: 6px; min-width: 88px; max-width: 108px;

        background: var(--bg-card); color: var(--text-main);

        border: 1px solid var(--border-card); border-radius: 10px;

        padding: 7px 10px;

        font-family: inherit; font-size: 0.72rem; font-weight: 800;

        cursor: pointer; transition: border-color 0.2s, background 0.2s;

    }

    .sort-dropdown-trigger:active { background: var(--bg-elevated); }

    .sort-dropdown.is-open .sort-dropdown-trigger {

        border-color: rgba(74, 222, 128, 0.4);

        background: var(--bg-elevated);

    }

    .sort-dropdown-chevron {

        font-size: 0.75rem; color: var(--point-green); font-weight: 900;

        transition: transform 0.22s cubic-bezier(0.1, 0.9, 0.2, 1);

        flex-shrink: 0;

    }

    .sort-dropdown.is-open .sort-dropdown-chevron {

        transform: rotate(180deg); color: var(--point-blue);

    }

    .dropdown-list {

        position: absolute; top: calc(100% + 6px); right: 0;

        min-width: 132px; margin: 0; padding: 6px;

        list-style: none;

        background: #18181b;

        border: 1px solid var(--border-card);

        border-radius: 12px;

        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.55);

        z-index: 999;

        opacity: 0; visibility: hidden; pointer-events: none;

        transform: translateY(-8px) scale(0.97);

        transform-origin: top right;

        transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.1, 0.9, 0.2, 1), visibility 0.22s;

    }

    .sort-dropdown.is-open .dropdown-list {

        opacity: 1; visibility: visible; pointer-events: auto;

        transform: translateY(0) scale(1);

    }

    .dropdown-item {

        padding: 10px 12px; border-radius: 8px;

        font-size: 0.74rem; font-weight: 800; color: #d4d4d8;

        cursor: pointer; transition: background 0.15s, color 0.15s;

        white-space: nowrap;

    }

    .dropdown-item:hover,

    .dropdown-item:focus {

        background: rgba(115, 165, 255, 0.1); color: var(--text-main); outline: none;

    }

    .dropdown-item.active {

        color: var(--point-green);

        background: rgba(74, 222, 128, 0.08);

    .feed-cat-badge {

        color: var(--text-main) !important; background: var(--bg-elevated) !important;

        border: none !important; margin-right: 6px !important; font-size: 0.72rem !important;

    }

    .feed-cat-badge--sponsor {

        color: var(--point-gold) !important; background: rgba(252, 211, 77, 0.12) !important;

    }

    .feed-meta-participants {

        order: 3 !important; margin-left: auto !important; color: var(--point-pink) !important;

        font-weight: 800 !important; display: inline-flex !important; align-items: center !important;

    }

    .feed-meta-timer { order: 2 !important; color: var(--point-gold) !important; }

    .feed-meta-timer.is-ended { color: #71717a !important; }



    /* A/B ?аэГЭьзА ы╕ФыЭ╝?╕ыУЬ ??ыйФьЭ╕ 'ьзАъ╕??иъ▒░??ы╢ИэМР'ъ│??ЩьЭ╝ */

    .king-ab-box, .text-vs-box {

        display: none !important; visibility: hidden !important; opacity: 0 !important;

        height: 0 !important; padding: 0 !important; margin: 0 !important;

    }

    .list-card .btn-pick { display: none !important; }



    .feed-loading, .feed-empty {

        padding: 36px 20px; text-align: center; color: var(--text-sub);

        font-size: 0.9rem; font-weight: 700; line-height: 1.55;

    }

    .feed-loading p { margin: 14px 0 0; color: #d4d4d8; display: flex; align-items: center; justify-content: center; gap: 6px; }

    .feed-spinner {

        width: 36px; height: 36px; margin: 0 auto;

        border: 3px solid var(--bg-elevated); border-top-color: var(--point-green);

    @keyframes feedSpin { to { transform: rotate(360deg); } }

    .feed-empty-title { color: var(--text-main); font-size: 0.95rem; margin: 0 0 16px; word-break: keep-all; font-weight: 800; }

    .btn-create-feed {

    }

    .btn-create-feed:active { transform: scale(0.98); }

    .feed-error { color: var(--point-pink); }

<script>

    var lastScrollTop = 0;

    window.addEventListener('scroll', function () {

        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;

        var header = document.getElementById('mainHeader');

        if (!header) return;

        if (scrollTop > lastScrollTop && scrollTop > 60) {

            header.style.top = '-120px';

        } else {

            header.style.top = '0';

        }

        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;

    });

</script>
