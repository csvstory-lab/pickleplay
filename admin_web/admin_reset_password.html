<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P!CKLE Admin — 비밀번호 재설정</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #09090b; color: #fff; font-family: 'Pretendard', sans-serif; }
    .box { width: 100%; max-width: 420px; padding: 40px; background: #121214; border: 1px solid #27272a; border-radius: 16px; }
    h1 { font-size: 1.4rem; margin: 0 0 8px; }
    p { color: #a1a1aa; font-size: 0.9rem; line-height: 1.5; }
    label { display: block; margin: 16px 0 8px; font-size: 0.85rem; font-weight: 700; color: #a1a1aa; }
    input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #3f3f46; background: #09090b; color: #fff; box-sizing: border-box; }
    button { width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: 8px; background: #00f0ff; color: #000; font-weight: 900; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 0.85rem; color: #71717a; }
</style>
</head>
<body>
<div class="box">
    <h1>🔐 관리자 비밀번호 재설정</h1>
    <p id="desc">이메일 링크로 접속하셨다면 새 비밀번호를 입력해 주세요.</p>
    <form id="resetForm">
        <label for="newPassword">새 비밀번호 (8자 이상)</label>
        <input type="password" id="newPassword" minlength="8" autocomplete="new-password" disabled>
        <label for="confirmPassword">비밀번호 확인</label>
        <input type="password" id="confirmPassword" minlength="8" autocomplete="new-password" disabled>
        <button type="submit" id="submitBtn" disabled>비밀번호 변경</button>
    </form>
    <div class="status" id="statusText">링크 확인 중…</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script>
(function () {
    var form = document.getElementById('resetForm');
    var statusText = document.getElementById('statusText');
    var submitBtn = document.getElementById('submitBtn');
    var enabled = false;

    function isRecoveryHash() {
        var h = window.location.hash || '';
        return h.indexOf('type=recovery') !== -1 || h.indexOf('access_token=') !== -1;
    }

    function enableForm() {
        enabled = true;
        document.getElementById('newPassword').disabled = false;
        document.getElementById('confirmPassword').disabled = false;
        submitBtn.disabled = false;
        statusText.textContent = '새 비밀번호를 입력해 주세요.';
    }

    function disableForm(msg) {
        statusText.textContent = msg;
        submitBtn.disabled = true;
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        if (!enabled) return;
        var p1 = document.getElementById('newPassword').value;
        var p2 = document.getElementById('confirmPassword').value;
        if (p1.length < 8) { alert('비밀번호는 8자 이상이어야 합니다.'); return; }
        if (p1 !== p2) { alert('비밀번호 확인이 일치하지 않습니다.'); return; }
        submitBtn.disabled = true;
        submitBtn.textContent = '변경 중…';
        try {
            var sb = window.getPickleSupabaseClient();
            var res = await sb.auth.updateUser({ password: p1 });
            if (res.error) throw res.error;
            await sb.auth.signOut();
            alert('비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요.');
            window.location.href = 'admin_login.html';
        } catch (err) {
            alert('변경 실패: ' + (err.message || String(err)));
            submitBtn.disabled = false;
            submitBtn.textContent = '비밀번호 변경';
        }
    });

    document.addEventListener('DOMContentLoaded', async function () {
        try {
            var sb = window.getPickleSupabaseClient();
            sb.auth.onAuthStateChange(function (event) {
                if (event === 'PASSWORD_RECOVERY') enableForm();
            });
            if (isRecoveryHash()) {
                setTimeout(function () {
                    if (!enabled) enableForm();
                }, 1500);
            } else {
                var session = await sb.auth.getSession();
                if (session.data && session.data.session && isRecoveryHash()) enableForm();
                else disableForm('유효한 재설정 링크가 필요합니다. 이메일의 링크를 다시 확인해 주세요.');
            }
        } catch (err) {
            disableForm('인증 모듈 로드 실패: ' + (err.message || String(err)));
        }
    });
})();
</script>
</body>
</html>
